<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマートチケット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#f0f0f0;
  display:flex;justify-content:center;
  min-height:100vh;
}
#app{
  width:100%;max-width:390px;min-height:100vh;
  background:#f5f5f5;position:relative;overflow:hidden;
}

/* ===== SCREENS ===== */
.screen{
  width:100%;min-height:100vh;
  position:absolute;top:0;left:0;
  transition:transform .3s ease,opacity .3s ease;
  background:#f5f5f5;
}
.screen.hidden{transform:translateX(100%);pointer-events:none;}
.screen.slide-out{transform:translateX(-25%);opacity:.6;pointer-events:none;}

/* ===== SCREEN 1 ===== */
#s1{background:#f5f5f5;overflow-y:auto;}

.s1-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:#fff;
  border-bottom:1px solid #eee;
  position:sticky;top:0;z-index:10;
}
.btn-back{
  color:#E91E8C;font-size:22px;font-weight:bold;
  background:none;border:none;cursor:pointer;padding:4px 8px;
}
.btn-enter{
  background:#E91E8C;color:#fff;
  border:none;border-radius:20px;
  padding:8px 16px;font-size:13px;font-weight:bold;
  cursor:pointer;white-space:nowrap;
}

.event-card{
  background:#fff;margin:8px 12px 0;border-radius:10px 10px 0 0;
  padding:16px;position:relative;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.event-year{font-size:12px;color:#888;margin-bottom:2px;}
.event-date-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;}
.event-date-big{font-size:36px;font-weight:bold;color:#222;line-height:1;}
.event-date-day{font-size:14px;color:#222;font-weight:bold;margin-top:6px;}
.event-times{font-size:12px;color:#555;line-height:1.8;}
.event-name{font-size:15px;font-weight:bold;color:#222;margin-bottom:4px;}
.event-venue{font-size:12px;color:#888;}
.event-menu{position:absolute;top:14px;right:14px;color:#aaa;font-size:18px;cursor:pointer;}

.ticket-name-bar{
  background:#E91E8C;margin:0 12px;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  border-radius:0;
}
.ticket-name-bar .name{color:#fff;font-size:16px;font-weight:bold;}
.ticket-name-bar .num{color:rgba(255,255,255,.8);font-size:12px;}

.ticket-body{
  background:#fff;margin:0 12px;
  padding:16px 14px;
  border-bottom:1.5px dashed #E91E8C;
  display:flex;align-items:flex-start;gap:12px;
}
.ticket-icon-wrap{flex-shrink:0;text-align:center;width:68px;}
.ticket-icon-circle{
  width:64px;height:64px;border-radius:50%;
  background:#F0F0F0;display:flex;align-items:center;justify-content:center;
  margin:0 auto 4px;
}
.ticket-icon-circle svg{width:36px;height:26px;}
.ticket-icon-circle.used-icon{filter:grayscale(100%) opacity(40%);}
.status-badge{
  font-size:10px;font-weight:bold;
  padding:2px 6px;border-radius:3px;
  display:inline-block;
}
.status-unused{background:#E91E8C;color:#fff;}
.status-used{background:#9E9E9E;color:#fff;}
.ticket-info{flex:1;}
.ticket-type{font-size:16px;font-weight:bold;color:#333;margin-bottom:4px;
  display:flex;align-items:center;gap:8px;}
.ticket-type .arrow{color:#aaa;font-size:14px;}
.ticket-seat{font-size:13px;color:#555;margin-bottom:4px;}
.ticket-price{font-size:18px;font-weight:bold;color:#333;}
.used-stamp-wrap{position:relative;}
.used-stamp{
  position:absolute;right:-8px;top:-12px;
  color:#D32F2F;border:3px solid #D32F2F;
  border-radius:5px;padding:3px 7px;
  font-size:18px;font-weight:bold;
  transform:rotate(-15deg);opacity:.85;
  white-space:nowrap;background:rgba(255,255,255,.6);
  z-index:5;
}
.used-date{font-size:12px;color:#888;margin-top:8px;}

.btn-distribute{
  display:flex;align-items:center;gap:8px;
  background:#fff;border:1.5px dashed #E91E8C;
  border-radius:8px;margin:8px 12px;padding:10px 16px;
  color:#E91E8C;font-size:13px;cursor:pointer;width:calc(100% - 24px);
}
.btn-distribute .icon{font-size:16px;}

.detail-section{
  background:#FCE4EC;margin:0 12px;border-radius:0 0 8px 8px;
  padding:14px;font-size:11px;color:#555;line-height:1.8;
}
.detail-title{font-size:13px;font-weight:bold;color:#333;margin-bottom:8px;}

.ticket-number{
  margin:4px 12px 8px;text-align:right;
  font-size:12px;color:#E91E8C;
}
.link-back-info{
  display:block;text-align:center;
  color:#E91E8C;font-size:13px;margin:8px 0 24px;
  text-decoration:none;
}
.btn-scroll-top{
  position:fixed;bottom:20px;right:calc(50% - 195px + 12px);
  width:40px;height:40px;border-radius:50%;
  background:#E91E8C;color:#fff;border:none;
  font-size:18px;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  z-index:20;
  display:flex;align-items:center;justify-content:center;
}

/* ===== SCREEN 2 (GATE) ===== */
#s2{background:#1A1A1A;display:flex;flex-direction:column;}

.s2-header{
  background:#fff;padding:14px 16px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.s2-header .count{font-size:14px;color:#333;font-weight:bold;}
.btn-close{
  width:32px;height:32px;border-radius:50%;
  background:#E91E8C;color:#fff;border:none;
  font-size:18px;cursor:pointer;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
}

.warn-banner{
  background:#FFEB3B;padding:10px 14px;flex-shrink:0;
}
.warn-banner p{font-size:12px;color:#D32F2F;font-weight:bold;line-height:1.6;}

.timestamp-bar{
  background:#4DB6AC;padding:8px 14px;flex-shrink:0;
  display:flex;justify-content:center;align-items:center;gap:16px;
}
.timestamp-text{font-size:14px;color:#fff;font-weight:bold;font-variant-numeric:tabular-nums;}
.valid-text{font-size:11px;color:rgba(255,255,255,.9);}

.stars-row{
  display:flex;justify-content:center;gap:24px;
  padding:12px 0 4px;flex-shrink:0;
}
.star{font-size:28px;color:#4CAF50;transition:opacity .2s;}
.star.dim{opacity:.15;}

.gate-card{
  background:#fff;margin:12px 20px;border-radius:16px;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.gate-top{
  background:linear-gradient(180deg,#42A5F5 0%,#5C6BC0 50%,#E91E8C 100%);
  height:180px;
  display:flex;align-items:center;justify-content:center;
}
.gate-text{
  font-size:48px;font-weight:bold;color:#0D47A1;
  text-decoration:underline;letter-spacing:4px;
}
.gate-name-bar{
  background:#4DB6AC;padding:10px 16px;
}
.gate-name-bar .gname{font-size:16px;font-weight:bold;color:#fff;}
.gate-bottom{
  background:#fff;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
}
.check-circle{
  width:44px;height:44px;border-radius:50%;
  background:#E91E8C;color:#fff;font-size:22px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.gate-type{font-size:15px;color:#333;}

/* スライダー */
.slider-area{
  margin:16px 20px;flex-shrink:0;
}
.slider-track{
  background:#333;border-radius:30px;height:52px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;
}
.slider-fill{
  position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,#E91E8C,#ff6bab);
  border-radius:30px;width:0%;transition:none;
}
.slider-thumb{
  width:48px;height:48px;border-radius:50%;
  background:#fff;position:absolute;left:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:grab;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  user-select:none;z-index:2;
}
.slider-label{
  position:absolute;width:100%;text-align:center;
  color:rgba(255,255,255,.7);font-size:13px;font-weight:bold;
  pointer-events:none;z-index:1;
}

/* ===== SCREEN 3 (使用済み確認) ===== */
#s3{background:#1A1A1A;display:flex;flex-direction:column;}

.s3-card{
  background:#fff;margin:12px 16px;border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.s3-valid-row{
  padding:16px;text-align:center;border-bottom:1px solid #f0f0f0;
}
.s3-valid-title{font-size:15px;font-weight:bold;color:#333;margin-bottom:8px;}
.s3-stars{display:flex;justify-content:center;gap:12px;}
.s3-star{font-size:24px;color:#4CAF50;}
.s3-event-row{padding:10px 16px;border-bottom:1px solid #f5f5f5;}
.s3-event-name{font-size:14px;font-weight:bold;color:#333;}
.s3-event-sub{font-size:12px;color:#888;}
.s3-name-bar{
  background:#FCE4EC;padding:10px 16px;
  border-bottom:1px solid #f0f0f0;
}
.s3-name{font-size:15px;font-weight:bold;color:#E91E8C;}
.s3-ticket-row{
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  position:relative;
}
.s3-icon{font-size:28px;filter:grayscale(100%);opacity:.5;flex-shrink:0;}
.s3-ticket-info{}
.s3-used-label{
  font-size:10px;background:#9E9E9E;color:#fff;
  border-radius:3px;padding:2px 5px;display:inline-block;margin-bottom:4px;
}
.s3-type{font-size:15px;color:#333;}
.s3-stamp{
  position:absolute;right:14px;top:50%;transform:translateY(-50%) rotate(-15deg);
  color:#D32F2F;border:3px solid #D32F2F;border-radius:5px;
  padding:4px 8px;font-size:20px;font-weight:bold;
  opacity:.85;background:rgba(255,255,255,.7);
}
.s3-date{
  padding:4px 16px 16px;
  font-size:12px;color:#888;
}
</style>
</head>
<body>
<div id="app">

<!-- ===== SCREEN 1 ===== -->
<div class="screen" id="s1">
  <div class="s1-header">
    <button class="btn-back">＜</button>
    <button class="btn-enter" id="btnEnter">入場画面に進む</button>
  </div>

  <div class="event-card">
    <div class="event-year" id="evYear"></div>
    <div class="event-date-row">
      <div>
        <div class="event-date-big" id="evDateBig"></div>
      </div>
      <div>
        <div class="event-date-day" id="evDateDay"></div>
        <div class="event-times" id="evTimes"></div>
      </div>
    </div>
    <div class="event-name" id="evName"></div>
    <div class="event-venue" id="evVenue"></div>
    <span class="event-menu">…</span>
  </div>

  <div class="ticket-name-bar">
    <span class="name" id="s1Name"></span>
    <span class="num">1枚目</span>
  </div>

  <div class="ticket-body" id="ticketBody">
    <div class="ticket-icon-wrap">
      <div class="ticket-icon-circle" id="s1IconCircle">
        <svg viewBox="0 0 36 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="3" width="36" height="20" rx="2" fill="#E91E8C"/>
          <circle cx="0" cy="13" r="3" fill="#F0F0F0"/>
          <circle cx="36" cy="13" r="3" fill="#F0F0F0"/>
          <line x1="10" y1="3" x2="10" y2="23" stroke="#FCE4EC" stroke-width="1" stroke-dasharray="2,2"/>
          <rect x="13" y="8" width="16" height="10" rx="1" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <span class="status-badge status-unused" id="s1Badge">未使用</span>
    </div>
    <div class="ticket-info used-stamp-wrap" id="ticketInfoWrap">
      <div class="ticket-type">
        <span id="s1Type"></span>
        <span class="arrow">›</span>
      </div>
      <div class="ticket-seat" id="s1Seat"></div>
      <div class="ticket-price" id="s1Price"></div>
      <div class="used-stamp" id="s1Stamp" style="display:none">使用済</div>
      <div class="used-date" id="s1UsedDate" style="display:none"></div>
    </div>
  </div>

  <button class="btn-distribute" id="btnDistribute">
    <span class="icon">🔗</span>同行者へ分配する
  </button>

  <div class="detail-section">
    <div class="detail-title" id="detailTitle"></div>
    <div id="detailText"></div>
  </div>

  <div class="ticket-number" id="s1TicketNum"></div>
  <a href="#" class="link-back-info">チケット裏面情報 ›</a>

  <button class="btn-scroll-top" onclick="document.getElementById('s1').scrollTop=0">↑</button>
</div>

<!-- ===== SCREEN 2 (GATE) ===== -->
<div class="screen hidden" id="s2">
  <div class="s2-header">
    <span class="count">1/1枚 選択中</span>
    <button class="btn-close" id="btnClose2">×</button>
  </div>

  <div class="warn-banner">
    <p>⚠ スライドすると使用済になります。</p>
    <p>使用済チケットは、入場・再発行不可</p>
  </div>

  <div class="timestamp-bar">
    <span class="timestamp-text" id="tsText">----/--/-- (-)  --:--:--.---</span>
    <span class="valid-text">期間中有効</span>
  </div>

  <div class="stars-row">
    <span class="star" id="star1">★</span>
    <span class="star" id="star2">★</span>
    <span class="star" id="star3">★</span>
  </div>

  <div class="gate-card">
    <div class="gate-top">
      <span class="gate-text">GATE</span>
    </div>
    <div class="gate-name-bar">
      <span class="gname" id="s2Name"></span>
    </div>
    <div class="gate-bottom">
      <div class="check-circle">✓</div>
      <span class="gate-type" id="s2Type"></span>
    </div>
  </div>

  <div class="slider-area">
    <div class="slider-track" id="sliderTrack">
      <div class="slider-fill" id="sliderFill"></div>
      <span class="slider-label">← スライドして入場 →</span>
      <div class="slider-thumb" id="sliderThumb">→</div>
    </div>
  </div>
</div>

<!-- ===== SCREEN 3 (使用済み確認) ===== -->
<div class="screen hidden" id="s3">
  <div class="s2-header">
    <span class="count">0/1枚 選択中</span>
    <button class="btn-close" id="btnClose3">×</button>
  </div>

  <div class="timestamp-bar">
    <span class="timestamp-text" id="tsText3">----/--/-- (-)  --:--:--.---</span>
    <span class="valid-text">期間中有効</span>
  </div>

  <div class="s3-card">
    <div class="s3-valid-row">
      <div class="s3-valid-title">期間中有効</div>
      <div class="s3-stars">
        <span class="s3-star">★</span>
        <span class="s3-star">★</span>
      </div>
    </div>
    <div class="s3-event-row">
      <div class="s3-event-name" id="s3EvName"></div>
      <div class="s3-event-sub" id="s3EvSub"></div>
    </div>
    <div class="s3-name-bar">
      <span class="s3-name" id="s3Name"></span>
    </div>
    <div class="s3-ticket-row">
      <span class="s3-icon">🎫</span>
      <div class="s3-ticket-info">
        <span class="s3-used-label">入場済</span>
        <div class="s3-type" id="s3Type"></div>
      </div>
      <div class="s3-stamp">使用済</div>
    </div>
    <div class="s3-date" id="s3UsedDate"></div>
  </div>
</div>

</div>

<script>
// ===== URLパラメーター =====
const p = new URLSearchParams(location.search);
const D = {
  name:   p.get('name')   || '薮下 柊',
  event:  p.get('event')  || '第6回 AKB48グループ歌唱力No.1決定戦 ファイナリストLIVE',
  venue:  p.get('venue')  || 'TACHIKAWA STAGE GARDEN',
  date:   p.get('date')   || '2025/2/18',
  day:    p.get('day')    || '火',
  open:   p.get('open')   || '18:00',
  start:  p.get('start')  || '19:00',
  type:   p.get('type')   || '指定席',
  floor:  p.get('floor')  || '1階',
  row:    p.get('row')    || '18列',
  num:    p.get('num')    || '5番',
  price:  p.get('price')  || '8800',
  ticketNum: p.get('ticket_num') || '1160027394397',
};

const dateParts = D.date.split('/');
const dateYear = dateParts[0] + '年';
const dateMD   = dateParts[1] + '/' + dateParts[2];

// 使用済み状態
let isUsed = sessionStorage.getItem('used') === '1';
let usedTime = sessionStorage.getItem('usedTime') || '';

function applyUsedState(){
  if(isUsed){
    document.getElementById('s1IconCircle').classList.add('used-icon');
    const badge = document.getElementById('s1Badge');
    badge.textContent = '入場済';
    badge.className = 'status-badge status-used';
    document.getElementById('s1Stamp').style.display = 'block';
    document.getElementById('s1UsedDate').style.display = 'block';
    document.getElementById('s1UsedDate').textContent = '使用日時: ' + usedTime;
    document.getElementById('btnDistribute').style.display = 'none';
  }
}

// ===== 画面1セット =====
document.getElementById('evYear').textContent = dateYear;
document.getElementById('evDateBig').textContent = dateMD;
document.getElementById('evDateDay').textContent = '（' + D.day + '）';
document.getElementById('evTimes').textContent = D.open + ' 開場\n' + D.start + ' 開演';
document.getElementById('evName').textContent = D.event;
document.getElementById('evVenue').textContent = D.venue;
document.getElementById('s1Name').textContent = D.name + ' 様';
document.getElementById('s1Type').textContent = D.type;
document.getElementById('s1Seat').textContent = D.floor + '　' + D.row + ' ' + D.num;
document.getElementById('s1Price').textContent = '¥' + Number(D.price).toLocaleString() + '（税込）';
document.getElementById('detailTitle').textContent = D.event;
document.getElementById('detailText').innerHTML =
  D.event + '<br>主催: TBSテレビ<br>※お一人様1枚ずつチケット必要<br>※未就学児入場不可<br>※小学生以下の方要保護者同伴<br>※入場時、持ち物検査と金属探知機による身体検査等を実施する場合有<br>※譲渡および転売禁止<br>※お客様氏名が記載のチケット、主催者指定の「本人確認書類を使用して本人確認実施。同伴者の方も全員チケットと主催者指定の本人確認書類要持参。<br>イープラス 050-3185-6483';
document.getElementById('s1TicketNum').textContent = 'チケット番号: ' + D.ticketNum;
document.getElementById('s2Name').textContent = D.name + ' 様';
document.getElementById('s2Type').textContent = D.type;
document.getElementById('s3Name').textContent = D.name + ' 様';
document.getElementById('s3EvName').textContent = D.event;
document.getElementById('s3EvSub').textContent = D.venue;
document.getElementById('s3Type').textContent = D.type;
applyUsedState();

// ===== タイムスタンプ =====
const DAYS = ['日','月','火','水','木','金','土'];
function updateTS(){
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dw = DAYS[now.getDay()];
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const ms = String(now.getMilliseconds()).padStart(3,'0');
  const str = y+'/'+mo+'/'+d+' ('+dw+')  '+h+':'+mi+':'+s+'.'+ms;
  document.getElementById('tsText').textContent = str;
  document.getElementById('tsText3').textContent = str;
}
setInterval(updateTS, 80);
updateTS();

// ===== 星アニメーション =====
function blinkStars(){
  const stars = [
    document.getElementById('star1'),
    document.getElementById('star2'),
    document.getElementById('star3'),
  ];
  stars.forEach((s,i)=>{
    setInterval(()=>{
      s.classList.toggle('dim');
    }, 600 + i * 237);
  });
}
blinkStars();

// ===== 画面遷移 =====
const s1 = document.getElementById('s1');
const s2 = document.getElementById('s2');
const s3 = document.getElementById('s3');

function goTo2(){
  s1.classList.add('slide-out');
  s2.classList.remove('hidden');
}
function goTo3(){
  s2.classList.add('slide-out');
  s3.classList.remove('hidden');
  // 使用済み処理
  isUsed = true;
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dw = DAYS[now.getDay()];
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  usedTime = y+'/'+mo+'/'+d+'('+dw+') '+h+':'+mi;
  sessionStorage.setItem('used','1');
  sessionStorage.setItem('usedTime', usedTime);
  document.getElementById('s3UsedDate').textContent = '使用日時: ' + usedTime;
}
function closeS2(){
  s2.classList.add('hidden');

// ===== スライダー =====
const track = document.getElementById('sliderTrack');
const thumb = document.getElementById('sliderThumb');
const fill  = document.getElementById('sliderFill');
let dragging = false;
let startX = 0;
let trackW = 0;
const thumbW = 52;

function startDrag(x){
  dragging = true;
  startX = x;
  trackW = track.offsetWidth;
  thumb.style.cursor = 'grabbing';
}
function moveDrag(x){
  if(!dragging) return;
  const maxLeft = trackW - thumbW - 4;
  let left = Math.min(Math.max(0, x - startX + 2), maxLeft);
  // 実際の位置は最初のclickX基準にする
  const rawLeft = Math.min(Math.max(2, x - track.getBoundingClientRect().left - thumbW/2), maxLeft);
  thumb.style.left = rawLeft + 'px';
  fill.style.width = (rawLeft / maxLeft * 100) + '%';
  if(rawLeft >= maxLeft - 4){
    endDrag(true);
  }
}
function endDrag(completed){
  if(!dragging) return;
  dragging = false;
  thumb.style.cursor = 'grab';
  if(!completed){
    // 戻す
    thumb.style.transition = 'left .2s ease';
    thumb.style.left = '2px';
    fill.style.transition = 'width .2s ease';
    fill.style.width = '0%';
    setTimeout(()=>{
      thumb.style.transition = '';
      fill.style.transition = '';
    }, 220);
  } else {
    setTimeout(goTo3, 200);
  }
}

// Mouse
thumb.addEventListener('mousedown', e=>{startDrag(e.clientX);e.preventDefault();});
document.addEventListener('mousemove', e=>{ if(dragging) moveDrag(e.clientX); });
document.addEventListener('mouseup', e=>{ if(dragging) endDrag(false); });

// Touch
thumb.addEventListener('touchstart', e=>{startDrag(e.touches[0].clientX);e.preventDefault();},{passive:false});
document.addEventListener('touchmove', e=>{ if(dragging) moveDrag(e.touches[0].clientX); },{passive:true});
document.addEventListener('touchend', e=>{ if(dragging) endDrag(false); });
</script>
