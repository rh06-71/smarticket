<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマートチケット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: #e0e0e0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

#app {
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  background: #f5f5f5;
  position: relative;
  overflow: hidden;
}

/* ===== SCREEN BASE ===== */
.screen {
  width: 100%;
  min-height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.screen.hidden {
  transform: translateX(100%);
  pointer-events: none;
}

.screen.slide-out {
  transform: translateX(-30%);
  opacity: 0.5;
  pointer-events: none;
}

/* ===== SCREEN 1 ===== */
#screen1 {
  background: #f5f5f5;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.s1-header {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid #eeeeee;
  position: sticky;
  top: 0;
  z-index: 10;
}

.btn-back {
  font-size: 20px;
  color: #E91E8C;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
  font-weight: bold;
}

.btn-enter {
  background: #E91E8C;
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 0.02em;
}

.btn-enter.disabled {
  background: #ccc;
  pointer-events: none;
}

/* Event info card */
.event-card {
  background: #fff;
  padding: 18px 16px 14px;
  margin-bottom: 8px;
  position: relative;
}

.event-year {
  font-size: 11px;
  color: #888888;
  margin-bottom: 2px;
}

.event-date-big {
  font-size: 32px;
  font-weight: bold;
  color: #333333;
  line-height: 1.1;
  margin-bottom: 6px;
}

.event-time {
  font-size: 13px;
  color: #555;
  margin-bottom: 12px;
}

.event-name {
  font-size: 14px;
  font-weight: bold;
  color: #333333;
  line-height: 1.5;
  margin-bottom: 4px;
  padding-right: 32px;
}

.event-venue {
  font-size: 12px;
  color: #888888;
}

.btn-more-event {
  position: absolute;
  top: 18px;
  right: 14px;
  background: none;
  border: none;
  font-size: 20px;
  color: #888;
  cursor: pointer;
  padding: 4px;
}

/* Name bar */
.name-bar {
  background: #FCE4EC;
  padding: 11px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0;
}

.name-bar-text {
  font-size: 16px;
  font-weight: bold;
  color: #E91E8C;
}

.name-bar-num {
  font-size: 13px;
  color: #888888;
}

/* Ticket face */
.ticket-face {
  background: #fff;
  margin-bottom: 8px;
  padding: 14px 16px 16px;
}

.ticket-face-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.ticket-face-icon {
  font-size: 26px;
  flex-shrink: 0;
}

.badge-unused {
  background: #E91E8C;
  color: #fff;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  padding: 3px 10px;
  letter-spacing: 0.05em;
}

.badge-used-s1 {
  background: #888;
  color: #fff;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  padding: 3px 10px;
  letter-spacing: 0.05em;
}

.ticket-face-type {
  font-size: 14px;
  color: #333333;
  margin-bottom: 5px;
  font-weight: 500;
}

.ticket-face-price {
  font-size: 13px;
  color: #888888;
}

.s1-stamp-wrap {
  position: relative;
  display: inline-block;
}

.s1-used-stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-15deg);
  border: 3px solid #D32F2F;
  color: #D32F2F;
  font-size: 28px;
  font-weight: 900;
  padding: 4px 12px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  letter-spacing: 3px;
  opacity: 0.85;
}

.s1-used-datetime {
  font-size: 11px;
  color: #888;
  margin-top: 8px;
}

/* Distribute button */
.btn-distribute {
  display: block;
  width: calc(100% - 16px);
  margin: 0 8px 8px;
  background: #fff;
  border: 1.5px dashed #E91E8C;
  color: #E91E8C;
  border-radius: 8px;
  padding: 13px;
  font-size: 14px;
  font-weight: bold;
  text-align: center;
  cursor: pointer;
  letter-spacing: 0.03em;
}

/* Details box */
.details-box {
  background: #fff;
  margin: 0 0 8px;
  padding: 14px 16px;
}

.details-box p {
  font-size: 11px;
  color: #888888;
  line-height: 1.7;
}

/* Scroll-to-top button */
.btn-totop {
  position: fixed;
  bottom: 24px;
  right: calc(50% - 390px/2 + 16px);
  width: 44px;
  height: 44px;
  background: #E91E8C;
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(233,30,140,0.35);
  z-index: 100;
  line-height: 1;
}

/* ===== SCREEN 2 & 3: GATE ===== */
#screen2, #screen3 {
  background: #1A1A1A;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.gate-header {
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.gate-select-label {
  font-size: 15px;
  font-weight: bold;
  color: #333333;
}

.btn-close {
  background: #E91E8C;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  flex-shrink: 0;
}

/* Warning banner */
.warning-banner {
  background: #FFEB3B;
  padding: 10px 14px;
  font-size: 12px;
  color: #D32F2F;
  line-height: 1.5;
  font-weight: 500;
}

/* Timestamp area */
.timestamp-area {
  padding: 14px 16px 10px;
}

.timestamp-bar {
  background: #4DB6AC;
  border-radius: 6px;
  padding: 9px 14px;
  margin-bottom: 8px;
  text-align: center;
}

.timestamp-text {
  font-family: "Courier New", "SF Mono", monospace;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  letter-spacing: 0.5px;
}

.valid-label {
  color: rgba(255,255,255,0.65);
  font-size: 11px;
  text-align: center;
  margin-bottom: 8px;
}

.stars-row {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.star {
  font-size: 22px;
  color: #4CAF50;
}

.star-1 { animation: starBlink 1.3s 0.0s infinite; }
.star-2 { animation: starBlink 1.7s 0.4s infinite; }
.star-3 { animation: starBlink 1.1s 0.9s infinite; }

@keyframes starBlink {
  0%, 100% { opacity: 1; transform: scale(1.05); }
  40% { opacity: 0.15; transform: scale(0.75); }
}

/* GATE card */
.gate-card {
  margin: 12px 12px 0;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  position: relative;
}

/* Gradient top for screen2 */
.gate-card-gradient {
  background: linear-gradient(180deg, #42A5F5 0%, #5C6BC0 50%, #E91E8C 100%);
  padding: 22px 16px 18px;
  text-align: center;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.gate-word {
  font-size: 56px;
  font-weight: 900;
  color: #1A237E;
  letter-spacing: 10px;
  line-height: 1;
  text-decoration: underline;
  text-underline-offset: 6px;
  text-decoration-thickness: 3px;
  margin-bottom: 0;
}

/* Name strip (teal) inside gate card */
.gate-name-strip {
  background: #4DB6AC;
  padding: 10px 16px;
  text-align: center;
}

.gate-name-strip-text {
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 0.03em;
}

/* Bottom white area */
.gate-card-white {
  background: #fff;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.gate-check-circle {
  width: 34px;
  height: 34px;
  background: #E91E8C;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  flex-shrink: 0;
}

.gate-type-text {
  font-size: 14px;
  color: #333333;
  font-weight: 500;
}

/* Slider */
.slide-area {
  margin: 14px 12px 28px;
  background: #fff;
  border-radius: 30px;
  padding: 5px;
  position: relative;
  height: 58px;
  overflow: hidden;
  user-select: none;
}

.slide-track {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.slide-text {
  font-size: 13px;
  color: #aaa;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

.slide-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: rgba(233,30,140,0.12);
  border-radius: 30px;
  pointer-events: none;
}

.slide-handle {
  position: absolute;
  left: 5px; top: 5px;
  width: 48px; height: 48px;
  background: #E91E8C;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  touch-action: none;
  z-index: 2;
  box-shadow: 0 2px 6px rgba(233,30,140,0.4);
}

.slide-handle:active { cursor: grabbing; }

.slide-handle-arrow {
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  line-height: 1;
  margin-left: 2px;
}

/* ===== SCREEN 3: Used card ===== */
.used-card {
  margin: 12px 12px 0;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  position: relative;
  padding: 18px 16px 20px;
}

.used-card-valid {
  font-size: 12px;
  color: #888;
  text-align: center;
  margin-bottom: 10px;
}

.used-card-stars {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 12px;
}

.used-card-venue {
  font-size: 13px;
  color: #555;
  text-align: center;
  margin-bottom: 12px;
}

.used-name-strip {
  background: #FCE4EC;
  padding: 9px 14px;
  border-radius: 6px;
  text-align: center;
  margin-bottom: 16px;
}

.used-name-strip-text {
  font-size: 15px;
  font-weight: bold;
  color: #E91E8C;
}

.used-icon-area {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  filter: grayscale(1) opacity(0.4);
  margin-bottom: 10px;
}

.used-entered-label {
  display: inline-block;
  background: #e0e0e0;
  color: #888;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  padding: 3px 12px;
  margin-bottom: 14px;
}

.used-stamp-overlay {
  transform: rotate(-15deg);
  border: 3px solid #D32F2F;
  color: #D32F2F;
  font-size: 32px;
  font-weight: 900;
  padding: 5px 14px;
  border-radius: 6px;
  white-space: nowrap;
  letter-spacing: 3px;
  opacity: 0.85;
  display: inline-block;
  margin-bottom: 14px;
}

.used-datetime-text {
  font-size: 12px;
  color: #888;
}

.used-card-center {
  text-align: center;
}
</style>
</head>
<body>
<div id="app">

  <!-- ===== SCREEN 1: チケット詳細 ===== -->
  <div id="screen1" class="screen">
    <div class="s1-header">
      <button class="btn-back" onclick="goBack()">＜</button>
      <button class="btn-enter" id="btnEnter" onclick="goToGate()">入場画面に進む</button>
    </div>

    <div class="event-card">
      <div class="event-year" id="s1Year"></div>
      <div class="event-date-big" id="s1DateBig"></div>
      <div class="event-time" id="s1Time"></div>
      <div class="event-name" id="s1EventName"></div>
      <div class="event-venue" id="s1Venue"></div>
      <button class="btn-more-event">…</button>
    </div>

    <div class="name-bar">
      <span class="name-bar-text" id="s1NameBar"></span>
      <span class="name-bar-num">1枚目</span>
    </div>

    <div class="ticket-face" id="ticketFace">
      <div class="ticket-face-top">
        <span class="ticket-face-icon">🎫</span>
        <span id="badgeStatus" class="badge-unused">未使用</span>
      </div>
      <div class="ticket-face-type" id="s1Seat"></div>
      <div class="ticket-face-price" id="s1Price"></div>
      <div id="s1UsedBlock" style="display:none;">
        <div class="s1-used-stamp">使用済</div>
        <div class="s1-used-datetime" id="s1UsedDatetime"></div>
      </div>
    </div>

    <button class="btn-distribute" id="btnDistribute">同行者へ分配する</button>

    <div class="details-box">
      <p id="s1Details"></p>
    </div>

    <button class="btn-totop" id="btnToTop" onclick="scrollToTop()" title="トップへ">↑</button>
  </div>

  <!-- ===== SCREEN 2: GATE入場 ===== -->
  <div id="screen2" class="screen hidden">
    <div class="gate-header">
      <span class="gate-select-label">1/1枚 選択中</span>
      <button class="btn-close" onclick="closeGate()">×</button>
    </div>

    <div class="warning-banner">
      ⚠ スライドすると使用済になります。使用済チケットは、入場・再発行不可
    </div>

    <div class="timestamp-area">
      <div class="timestamp-bar">
        <div class="timestamp-text" id="s2Timestamp">----/--/-- --:--:--.---</div>
      </div>
      <div class="valid-label">期間中有効</div>
      <div class="stars-row">
        <span class="star star-1">★</span>
        <span class="star star-2">★</span>
        <span class="star star-3">★</span>
      </div>
    </div>

    <div class="gate-card">
      <div class="gate-card-gradient">
        <div class="gate-word">GATE</div>
      </div>
      <div class="gate-name-strip">
        <div class="gate-name-strip-text" id="s2Name"></div>
      </div>
      <div class="gate-card-white">
        <div class="gate-check-circle">✓</div>
        <div class="gate-type-text" id="s2Type"></div>
      </div>
    </div>

    <div class="slide-area" id="slideArea">
      <div class="slide-fill" id="slideFill"></div>
      <div class="slide-track">
        <span class="slide-text">スライドして入場 ›››</span>
      </div>
      <div class="slide-handle" id="slideHandle">
        <span class="slide-handle-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 3: 使用済み ===== -->
  <div id="screen3" class="screen hidden">
    <div class="gate-header">
      <span class="gate-select-label">0/1枚 選択中</span>
      <button class="btn-close" onclick="closeUsed()">×</button>
    </div>

    <div class="timestamp-area">
      <div class="timestamp-bar">
        <div class="timestamp-text" id="s3Timestamp">----/--/-- --:--:--.---</div>
      </div>
      <div class="valid-label">期間中有効</div>
      <div class="stars-row">
        <span class="star star-1">★</span>
        <span class="star star-2">★</span>
      </div>
    </div>

    <div class="used-card">
      <div class="used-card-center">
        <div class="used-card-valid">期間中有効</div>
        <div class="used-card-venue" id="s3Venue"></div>
        <div class="used-name-strip">
          <div class="used-name-strip-text" id="s3Name"></div>
        </div>
        <div class="used-icon-area">🎫</div>
        <div><span class="used-entered-label">入場済</span></div>
        <div><span class="used-stamp-overlay">使用済</span></div>
        <div class="used-datetime-text" id="s3UsedDatetime"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ===== URLパラメーター =====
const params = new URLSearchParams(location.search);
const p = (key, def) => params.get(key) || def;

const ticket = {
  name:       p('name',       '薮下 柊'),
  event:      p('event',      '第6回 AKB48グループ歌唱力No.1決定戦 ファイナリストLIVE'),
  venue:      p('venue',      'TACHIKAWA STAGE GARDEN'),
  date:       p('date',       '2025/2/18'),
  day:        p('day',        '火'),
  open:       p('open',       '18:00'),
  start:      p('start',      '19:00'),
  type:       p('type',       '指定席'),
  floor:      p('floor',      '1階'),
  row:        p('row',        '18列'),
  num:        p('num',        '5番'),
  price:      p('price',      '8800'),
  ticket_num: p('ticket_num', '1160027394397'),
};

// ===== sessionStorage =====
const USED_KEY = 'ticket_used';
const USED_DT_KEY = 'ticket_used_datetime';

function isUsed() { return sessionStorage.getItem(USED_KEY) === '1'; }
function setUsed(dtStr) {
  sessionStorage.setItem(USED_KEY, '1');
  sessionStorage.setItem(USED_DT_KEY, dtStr);
}
function getUsedDatetime() { return sessionStorage.getItem(USED_DT_KEY) || ''; }

// ===== 日付フォーマット =====
const DAY_NAMES = ['日','月','火','水','木','金','土'];

function parseDateParts() {
  const parts = ticket.date.split('/');
  return { year: parts[0] || '', m: parts[1] || '', d: parts[2] || '' };
}

function formatTimestamp(dt) {
  const y = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d  = String(dt.getDate()).padStart(2, '0');
  const w  = DAY_NAMES[dt.getDay()];
  const h  = String(dt.getHours()).padStart(2, '0');
  const mi = String(dt.getMinutes()).padStart(2, '0');
  const s  = String(dt.getSeconds()).padStart(2, '0');
  const ms = String(dt.getMilliseconds()).padStart(3, '0');
  return `${y}/${mo}/${d}(${w}) ${h}:${mi}:${s}.${ms}`;
}

function formatUsedDatetime(dt) {
  const y  = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d  = String(dt.getDate()).padStart(2, '0');
  const w  = DAY_NAMES[dt.getDay()];
  const h  = String(dt.getHours()).padStart(2, '0');
  const mi = String(dt.getMinutes()).padStart(2, '0');
  return `${y}/${mo}/${d}(${w}) ${h}:${mi}`;
}

// ===== 画面1 初期化 =====
function initScreen1() {
  const { year, m, d } = parseDateParts();
  document.getElementById('s1Year').textContent = year + '年';
  document.getElementById('s1DateBig').textContent = `${m}/${d}（${ticket.day}）`;
  document.getElementById('s1Time').textContent = `${ticket.open} 開場 / ${ticket.start} 開演`;
  document.getElementById('s1EventName').textContent = ticket.event;
  document.getElementById('s1Venue').textContent = ticket.venue;
  document.getElementById('s1NameBar').textContent = ticket.name + ' 様';
  document.getElementById('s1Seat').textContent =
    `${ticket.type} / ${ticket.floor} ${ticket.row} ${ticket.num}`;
  document.getElementById('s1Price').textContent =
    `¥${Number(ticket.price).toLocaleString()}（税込）`;

  const details =
    `【公演詳細】\nイベント名: ${ticket.event}\n会場: ${ticket.venue}\n` +
    `日時: ${ticket.date}（${ticket.day}） ${ticket.open}開場 / ${ticket.start}開演\n` +
    `座席: ${ticket.type} ${ticket.floor} ${ticket.row} ${ticket.num}\n` +
    `チケット番号: ${ticket.ticket_num}`;
  document.getElementById('s1Details').textContent = details;

  applyUsedStateToScreen1();
}

function applyUsedStateToScreen1() {
  const used = isUsed();
  const badge = document.getElementById('badgeStatus');
  const usedBlock = document.getElementById('s1UsedBlock');
  const usedDt = document.getElementById('s1UsedDatetime');
  const distribute = document.getElementById('btnDistribute');
  const btnEnter = document.getElementById('btnEnter');

  if (used) {
    badge.className = 'badge-used-s1';
    badge.textContent = '入場済';
    usedBlock.style.display = 'block';
    usedDt.textContent = '使用日時: ' + getUsedDatetime();
    distribute.style.display = 'none';
    btnEnter.classList.add('disabled');
    btnEnter.textContent = '入場済み';
  } else {
    badge.className = 'badge-unused';
    badge.textContent = '未使用';
    usedBlock.style.display = 'none';
    distribute.style.display = 'block';
    btnEnter.classList.remove('disabled');
    btnEnter.textContent = '入場画面に進む';
  }
}

// ===== 画面2/3 初期化 =====
function initGateScreens() {
  document.getElementById('s2Name').textContent = ticket.name + ' 様';
  document.getElementById('s2Type').textContent = ticket.type;
  document.getElementById('s3Name').textContent = ticket.name + ' 様';
  document.getElementById('s3Venue').textContent = ticket.venue;
}

// ===== タイムスタンプ =====
let tsInterval = null;

function startTimestamp() {
  if (tsInterval) return;
  tsInterval = setInterval(() => {
    const str = formatTimestamp(new Date());
    const el2 = document.getElementById('s2Timestamp');
    const el3 = document.getElementById('s3Timestamp');
    if (el2) el2.textContent = str;
    if (el3) el3.textContent = str;
  }, 100);
}

function stopTimestamp() {
  if (tsInterval) { clearInterval(tsInterval); tsInterval = null; }
}

// ===== 画面遷移 =====
let currentScreen = 'screen1';

function showScreen(to, from, direction) {
  const fromEl = document.getElementById(from);
  const toEl   = document.getElementById(to);

  if (direction === 'forward') {
    toEl.classList.remove('hidden');
    toEl.style.transform = 'translateX(100%)';
    toEl.style.opacity = '1';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fromEl.classList.add('slide-out');
      toEl.style.transform = 'translateX(0)';
      toEl.style.transition = 'transform 0.3s ease';
    }));
    setTimeout(() => {
      fromEl.classList.add('hidden');
      fromEl.classList.remove('slide-out');
    }, 310);
  } else {
    toEl.classList.remove('hidden');
    toEl.style.transform = 'translateX(-30%)';
    toEl.style.opacity = '0.5';
    toEl.style.transition = 'none';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fromEl.style.transition = 'transform 0.3s ease';
      fromEl.style.transform = 'translateX(100%)';
      fromEl.style.opacity = '1';
      toEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      toEl.style.transform = 'translateX(0)';
      toEl.style.opacity = '1';
    }));
    setTimeout(() => {
      fromEl.classList.add('hidden');
      fromEl.style.transform = '';
      fromEl.style.transition = '';
      fromEl.style.opacity = '';
      toEl.style.transform = '';
      toEl.style.transition = '';
      toEl.style.opacity = '';
    }, 310);
  }
  currentScreen = to;
}

function goToGate() {
  if (isUsed()) return;
  startTimestamp();
  showScreen('screen2', 'screen1', 'forward');
  resetSlider();
}

function closeGate() {
  showScreen('screen1', 'screen2', 'backward');
  stopTimestamp();
}

function closeUsed() {
  applyUsedStateToScreen1();
  showScreen('screen1', 'screen3', 'backward');
  stopTimestamp();
}

function goBack() { /* placeholder */ }

function scrollToTop() {
  document.getElementById('screen1').scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== スライダー =====
let sliding = false, startX = 0, slideMax = 0;

function resetSlider() {
  const handle = document.getElementById('slideHandle');
  const fill   = document.getElementById('slideFill');
  handle.style.transition = 'left 0.3s ease';
  fill.style.transition   = 'width 0.3s ease';
  handle.style.left = '5px';
  fill.style.width  = '0px';
}

function initSlider() {
  const handle = document.getElementById('slideHandle');
  const area   = document.getElementById('slideArea');

  function onStart(clientX) {
    sliding = true;
    startX  = clientX;
    slideMax = area.offsetWidth - handle.offsetWidth - 10;
    handle.style.transition = 'none';
    document.getElementById('slideFill').style.transition = 'none';
  }

  function onMove(clientX) {
    if (!sliding) return;
    const dx = clientX - startX;
    const newLeft = Math.min(Math.max(5, 5 + dx), slideMax + 5);
    handle.style.left = newLeft + 'px';
    document.getElementById('slideFill').style.width = newLeft + 'px';
    if (newLeft >= slideMax + 5) {
      sliding = false;
      completeSlide();
    }
  }

  function onEnd() {
    if (!sliding) return;
    sliding = false;
    resetSlider();
  }

  // Touch
  handle.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX); }, { passive: false });
  document.addEventListener('touchmove', e => { if (sliding) { e.preventDefault(); onMove(e.touches[0].clientX); } }, { passive: false });
  document.addEventListener('touchend', onEnd);

  // Mouse
  handle.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX); });
  document.addEventListener('mousemove', e => { onMove(e.clientX); });
  document.addEventListener('mouseup', onEnd);
}

function completeSlide() {
  const now   = new Date();
  const dtStr = formatUsedDatetime(now);
  setUsed(dtStr);
  document.getElementById('s3UsedDatetime').textContent = '使用日時: ' + dtStr;
  showScreen('screen3', 'screen2', 'forward');
}

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', () => {
  initScreen1();
  initGateScreens();
  initSlider();
});
</script>
