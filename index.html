<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマートチケット</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  #app {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: #f0f0f0;
    position: relative;
    overflow: hidden;
  }

  /* ===== SCREEN BASE ===== */
  .screen {
    width: 100%;
    min-height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
    background: #f0f0f0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .screen.hidden {
    transform: translateX(100%);
    pointer-events: none;
  }

  .screen.slide-out {
    transform: translateX(-30%);
    opacity: 0.5;
    pointer-events: none;
  }

  /* ===== SCREEN 1: チケット詳細 ===== */
  #screen1 {
    overflow-y: auto;
  }

  /* Header */
  .header {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #e8e8e8;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .btn-back {
    font-size: 22px;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  .btn-enter {
    background: #E91E8C;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }

  /* Event info */
  .event-info {
    background: #fff;
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
  }

  .event-year {
    font-size: 12px;
    color: #999;
    margin-bottom: 2px;
  }

  .event-date-big {
    font-size: 30px;
    font-weight: bold;
    color: #111;
    margin-bottom: 4px;
  }

  .event-time {
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
  }

  .event-name {
    font-size: 15px;
    font-weight: bold;
    color: #111;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .event-venue {
    font-size: 13px;
    color: #888;
  }

  .btn-more {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    color: #888;
    cursor: pointer;
  }

  /* Ticket card */
  .ticket-card {
    background: #E91E8C;
    margin: 0 10px 10px;
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .ticket-card.used {
    background: #999;
  }

  .ticket-card-top {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .ticket-icon {
    font-size: 24px;
    margin-right: 8px;
    filter: brightness(0) invert(1);
  }

  .ticket-icon.used-icon {
    filter: brightness(0) invert(0.7);
  }

  .badge-unused {
    border: 1.5px solid #4caf50;
    color: #4caf50;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    padding: 2px 8px;
  }

  .badge-used {
    border: 1.5px solid #f44336;
    color: #f44336;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    padding: 2px 8px;
  }

  .ticket-name-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .ticket-name {
    color: #fff;
    font-size: 20px;
    font-weight: bold;
  }

  .ticket-num-label {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
  }

  .ticket-seat {
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    margin-bottom: 6px;
  }

  .ticket-price {
    color: #fff;
    font-size: 13px;
  }

  /* Used stamp */
  .used-stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    border: 4px solid rgba(220, 30, 30, 0.85);
    color: rgba(220, 30, 30, 0.85);
    font-size: 42px;
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 8px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 4px;
  }

  .used-datetime {
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    margin-top: 8px;
  }

  /* Distribute button */
  .btn-distribute {
    display: block;
    width: calc(100% - 20px);
    margin: 0 10px 10px;
    background: #fff;
    border: 2px solid #E91E8C;
    color: #E91E8C;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
  }

  /* Details text */
  .details-box {
    background: #f7f7f7;
    margin: 0 10px 10px;
    border-radius: 8px;
    padding: 12px;
  }

  .details-box p {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
  }

  .back-info-link {
    text-align: center;
    padding: 10px;
    font-size: 13px;
    color: #E91E8C;
    text-decoration: underline;
    cursor: pointer;
    display: block;
    margin-bottom: 20px;
  }

  /* ===== SCREEN 2 & 3: GATE画面 ===== */
  #screen2, #screen3 {
    overflow-y: auto;
    background: #1a1a2e;
  }

  .gate-header {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .gate-select-label {
    font-size: 15px;
    font-weight: bold;
    color: #111;
  }

  .btn-close {
    background: #E91E8C;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  /* Warning banner */
  .warning-banner {
    background: #fffde7;
    border-left: 4px solid #f9a825;
    padding: 10px 14px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
  }

  /* Timestamp area */
  .timestamp-area {
    background: #1a1a2e;
    padding: 14px 16px 10px;
    text-align: center;
  }

  .timestamp-bar {
    background: #2ecc71;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 8px;
  }

  .timestamp-text {
    font-family: "Courier New", monospace;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 1px;
  }

  .valid-label {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    margin-bottom: 8px;
  }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 6px;
  }

  .star {
    font-size: 22px;
    color: #2ecc71;
    animation: starBlink 1.5s infinite;
  }

  .star:nth-child(2) { animation-delay: 0.5s; }
  .star:nth-child(3) { animation-delay: 1.0s; }

  @keyframes starBlink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(0.7); }
  }

  /* GATE card */
  .gate-card {
    margin: 12px 10px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .gate-card-top {
    background: #00bcd4;
    padding: 18px 16px 14px;
    text-align: center;
  }

  .gate-card-top.used-top {
    background: #888;
  }

  .gate-word {
    font-size: 52px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 8px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .gate-name {
    color: rgba(255,255,255,0.95);
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 2px;
  }

  .gate-type {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    margin-bottom: 8px;
  }

  .gate-check {
    font-size: 36px;
    color: #2ecc71;
  }

  .gate-check.used-check {
    color: rgba(255,255,255,0.5);
  }

  .gate-card-bottom {
    background: #E91E8C;
    padding: 12px 16px;
    text-align: center;
  }

  .gate-card-bottom.used-bottom {
    background: #aaa;
  }

  .gate-ticket-num {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-family: monospace;
  }

  .gate-used-label {
    color: #ff5252;
    background: rgba(255,255,255,0.95);
    border: 2px solid #ff5252;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
    padding: 2px 10px;
    display: inline-block;
    margin-bottom: 6px;
  }

  .gate-stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    border: 5px solid rgba(220, 30, 30, 0.9);
    color: rgba(220, 30, 30, 0.9);
    font-size: 44px;
    font-weight: 900;
    padding: 8px 16px;
    border-radius: 8px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 4px;
    background: rgba(255,255,255,0.08);
  }

  .gate-used-datetime {
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    margin-top: 6px;
  }

  /* Slide area */
  .slide-area {
    margin: 12px 10px 24px;
    background: #fff;
    border-radius: 30px;
    padding: 5px;
    position: relative;
    height: 56px;
    overflow: hidden;
    user-select: none;
  }

  .slide-track {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide-text {
    font-size: 14px;
    color: #999;
    pointer-events: none;
    white-space: nowrap;
  }

  .slide-handle {
    position: absolute;
    left: 5px;
    top: 5px;
    width: 46px;
    height: 46px;
    background: #E91E8C;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    touch-action: none;
    z-index: 2;
    transition: left 0.1s;
  }

  .slide-handle:active {
    cursor: grabbing;
  }

  .slide-handle-arrow {
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    line-height: 1;
  }

  .slide-fill {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    background: rgba(233,30,140,0.15);
    border-radius: 30px;
    transition: width 0.1s;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== SCREEN 1: チケット詳細 ===== -->
  <div id="screen1" class="screen">
    <div class="header">
      <button class="btn-back" onclick="goBack()">＜</button>
      <button class="btn-enter" id="btnEnter" onclick="goToGate()">入場画面に進む</button>
    </div>

    <div class="event-info">
      <div class="event-year" id="s1Year"></div>
      <div class="event-date-big" id="s1DateBig"></div>
      <div class="event-time" id="s1Time"></div>
      <div class="event-name" id="s1EventName"></div>
      <div class="event-venue" id="s1Venue"></div>
      <button class="btn-more">…</button>
    </div>

    <div class="ticket-card" id="ticketCard">
      <div class="ticket-card-top">
        <span class="ticket-icon" id="ticketIcon">🎫</span>
        <span id="badgeStatus" class="badge-unused">未使用</span>
      </div>
      <div class="ticket-name-row">
        <span class="ticket-name" id="s1Name"></span>
        <span class="ticket-num-label">1枚目</span>
      </div>
      <div class="ticket-seat" id="s1Seat"></div>
      <div class="ticket-price" id="s1Price"></div>
      <div class="used-stamp" id="s1Stamp" style="display:none;">使用済</div>
      <div class="used-datetime" id="s1UsedDatetime" style="display:none;"></div>
    </div>

    <button class="btn-distribute" id="btnDistribute">同行者へ分配する</button>

    <div class="details-box">
      <p id="s1Details"></p>
    </div>

    <a class="back-info-link">チケット裏面情報を見る</a>
  </div>

  <!-- ===== SCREEN 2: GATE画面 ===== -->
  <div id="screen2" class="screen hidden">
    <div class="gate-header">
      <span class="gate-select-label">1/1枚 選択中</span>
      <button class="btn-close" onclick="closeGate()">×</button>
    </div>

    <div class="warning-banner">
      ⚠ スライドすると使用済になります。使用済チケットは、入場・再発行不可
    </div>

    <div class="timestamp-area">
      <div class="timestamp-bar">
        <div class="timestamp-text" id="s2Timestamp">----/--/-- --:--:--.---</div>
      </div>
      <div class="valid-label">期間中有効</div>
      <div class="stars-row">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>
    </div>

    <div class="gate-card" id="gateCard2">
      <div class="gate-card-top" id="gateCardTop2">
        <div class="gate-word">GATE</div>
        <div class="gate-name" id="s2Name"></div>
        <div class="gate-type" id="s2Type"></div>
        <div class="gate-check">✓</div>
      </div>
      <div class="gate-card-bottom">
        <div class="gate-ticket-num" id="s2TicketNum"></div>
      </div>
    </div>

    <div class="slide-area" id="slideArea">
      <div class="slide-fill" id="slideFill"></div>
      <div class="slide-track">
        <span class="slide-text">← 左にスライドして入場 →</span>
      </div>
      <div class="slide-handle" id="slideHandle">
        <span class="slide-handle-arrow">›</span>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN 3: 使用済み確認 ===== -->
  <div id="screen3" class="screen hidden">
    <div class="gate-header">
      <span class="gate-select-label">0/1枚 選択中</span>
      <button class="btn-close" onclick="closeUsed()">×</button>
    </div>

    <div class="warning-banner">
      ⚠ スライドすると使用済になります。使用済チケットは、入場・再発行不可
    </div>

    <div class="timestamp-area">
      <div class="timestamp-bar">
        <div class="timestamp-text" id="s3Timestamp">----/--/-- --:--:--.---</div>
      </div>
      <div class="valid-label">期間中有効</div>
      <div class="stars-row">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>
    </div>

    <div class="gate-card" id="gateCard3">
      <div class="gate-card-top used-top" id="gateCardTop3">
        <div class="gate-word">GATE</div>
        <div class="gate-name" id="s3Name"></div>
        <div class="gate-type" id="s3Type"></div>
        <div class="gate-check used-check">✓</div>
        <div class="gate-used-label">入場済</div>
        <div class="gate-used-datetime" id="s3UsedDatetime"></div>
      </div>
      <div class="gate-card-bottom used-bottom">
        <div class="gate-ticket-num" id="s3TicketNum"></div>
      </div>
      <div class="gate-stamp">使用済</div>
    </div>
  </div>

</div>

<script>
// ===== URLパラメーター取得 =====
const params = new URLSearchParams(location.search);
const p = (key, def) => params.get(key) || def;

const ticket = {
  name:       p('name',       '薮下 柊'),
  event:      p('event',      '第6回 AKB48グループ歌唱力No.1決定戦 ファイナリストLIVE'),
  venue:      p('venue',      'TACHIKAWA STAGE GARDEN'),
  date:       p('date',       '2025/2/18'),
  day:        p('day',        '火'),
  open:       p('open',       '18:00'),
  start:      p('start',      '19:00'),
  type:       p('type',       '指定席'),
  floor:      p('floor',      '1階'),
  row:        p('row',        '18列'),
  num:        p('num',        '5番'),
  price:      p('price',      '8800'),
  ticket_num: p('ticket_num', '1160027394397'),
};

// ===== sessionStorage: 使用済み状態 =====
const USED_KEY = 'ticket_used';
const USED_DT_KEY = 'ticket_used_datetime';

function isUsed() {
  return sessionStorage.getItem(USED_KEY) === '1';
}

function setUsed(dtStr) {
  sessionStorage.setItem(USED_KEY, '1');
  sessionStorage.setItem(USED_DT_KEY, dtStr);
}

function getUsedDatetime() {
  return sessionStorage.getItem(USED_DT_KEY) || '';
}

// ===== 日付フォーマット =====
function parseDateParts() {
  // "2025/2/18" → { year: '2025', m: '2', d: '18' }
  const parts = ticket.date.split('/');
  return { year: parts[0] || '', m: parts[1] || '', d: parts[2] || '' };
}

const DAY_NAMES = ['日','月','火','水','木','金','土'];

function formatTimestamp(dt) {
  const y = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  const w = DAY_NAMES[dt.getDay()];
  const h = String(dt.getHours()).padStart(2, '0');
  const mi = String(dt.getMinutes()).padStart(2, '0');
  const s = String(dt.getSeconds()).padStart(2, '0');
  const ms = String(dt.getMilliseconds()).padStart(3, '0');
  return `${y}/${mo}/${d}(${w}) ${h}:${mi}:${s}.${ms}`;
}

function formatUsedDatetime(dt) {
  const y = dt.getFullYear();
  const mo = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  const w = DAY_NAMES[dt.getDay()];
  const h = String(dt.getHours()).padStart(2, '0');
  const mi = String(dt.getMinutes()).padStart(2, '0');
  return `${y}/${mo}/${d}(${w}) ${h}:${mi}`;
}

// ===== 画面1 初期化 =====
function initScreen1() {
  const { year, m, d } = parseDateParts();
  document.getElementById('s1Year').textContent = year + '年';
  document.getElementById('s1DateBig').textContent = `${m}/${d}（${ticket.day}）`;
  document.getElementById('s1Time').textContent = `${ticket.open} 開場 / ${ticket.start} 開演`;
  document.getElementById('s1EventName').textContent = ticket.event;
  document.getElementById('s1Venue').textContent = ticket.venue;
  document.getElementById('s1Name').textContent = ticket.name + ' 様';
  document.getElementById('s1Seat').textContent = `${ticket.type} / ${ticket.floor} ${ticket.row} ${ticket.num}`;
  document.getElementById('s1Price').textContent = `¥${Number(ticket.price).toLocaleString()}（税込）`;

  const details = `【公演詳細】\nイベント名: ${ticket.event}\n会場: ${ticket.venue}\n日時: ${ticket.date}（${ticket.day}） ${ticket.open}開場 / ${ticket.start}開演\n座席: ${ticket.type} ${ticket.floor} ${ticket.row} ${ticket.num}\nチケット番号: ${ticket.ticket_num}`;
  document.getElementById('s1Details').textContent = details;

  applyUsedStateToScreen1();
}

function applyUsedStateToScreen1() {
  const used = isUsed();
  const card = document.getElementById('ticketCard');
  const badge = document.getElementById('badgeStatus');
  const stamp = document.getElementById('s1Stamp');
  const usedDt = document.getElementById('s1UsedDatetime');
  const distribute = document.getElementById('btnDistribute');

  if (used) {
    card.classList.add('used');
    badge.className = 'badge-used';
    badge.textContent = '入場済';
    stamp.style.display = 'block';
    usedDt.style.display = 'block';
    usedDt.textContent = '使用日時: ' + getUsedDatetime();
    distribute.style.display = 'none';
  } else {
    card.classList.remove('used');
    badge.className = 'badge-unused';
    badge.textContent = '未使用';
    stamp.style.display = 'none';
    usedDt.style.display = 'none';
    distribute.style.display = 'block';
  }
}

// ===== 画面2/3 初期化 =====
function initGateScreens() {
  document.getElementById('s2Name').textContent = ticket.name + ' 様';
  document.getElementById('s2Type').textContent = ticket.type;
  document.getElementById('s2TicketNum').textContent = ticket.ticket_num;
  document.getElementById('s3Name').textContent = ticket.name + ' 様';
  document.getElementById('s3Type').textContent = ticket.type;
  document.getElementById('s3TicketNum').textContent = ticket.ticket_num;
}

// ===== タイムスタンプ更新 =====
let tsInterval = null;

function startTimestamp() {
  if (tsInterval) return;
  tsInterval = setInterval(() => {
    const now = new Date();
    const str = formatTimestamp(now);
    const el2 = document.getElementById('s2Timestamp');
    const el3 = document.getElementById('s3Timestamp');
    if (el2) el2.textContent = str;
    if (el3) el3.textContent = str;
  }, 100);
}

function stopTimestamp() {
  if (tsInterval) {
    clearInterval(tsInterval);
    tsInterval = null;
  }
}

// ===== 画面遷移 =====
let currentScreen = 'screen1';

function showScreen(to, from, direction) {
  const fromEl = document.getElementById(from);
  const toEl = document.getElementById(to);

  if (direction === 'forward') {
    toEl.classList.remove('hidden');
    toEl.style.transform = 'translateX(100%)';
    toEl.style.opacity = '1';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fromEl.classList.add('slide-out');
        toEl.style.transform = 'translateX(0)';
        toEl.style.transition = 'transform 0.3s ease';
      });
    });
    setTimeout(() => {
      fromEl.classList.add('hidden');
      fromEl.classList.remove('slide-out');
    }, 300);
  } else {
    // backward
    toEl.classList.remove('hidden');
    toEl.style.transform = 'translateX(-30%)';
    toEl.style.opacity = '0.5';
    toEl.style.transition = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fromEl.style.transition = 'transform 0.3s ease';
        fromEl.style.transform = 'translateX(100%)';
        fromEl.style.opacity = '1';
        toEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        toEl.style.transform = 'translateX(0)';
        toEl.style.opacity = '1';
      });
    });
    setTimeout(() => {
      fromEl.classList.add('hidden');
      fromEl.style.transform = '';
      fromEl.style.transition = '';
      fromEl.style.opacity = '';
      toEl.style.transform = '';
      toEl.style.transition = '';
      toEl.style.opacity = '';
    }, 300);
  }

  currentScreen = to;
}

function goToGate() {
  startTimestamp();
  showScreen('screen2', 'screen1', 'forward');
  resetSlider();
}

function closeGate() {
  showScreen('screen1', 'screen2', 'backward');
  stopTimestamp();
}

function closeUsed() {
  applyUsedStateToScreen1();
  showScreen('screen1', 'screen3', 'backward');
  stopTimestamp();
}

function goBack() {
  // placeholder
}

// ===== スライダー =====
let sliding = false;
let startX = 0;
let currentX = 0;
let slideMax = 0;

function resetSlider() {
  const handle = document.getElementById('slideHandle');
  const fill = document.getElementById('slideFill');
  handle.style.left = '5px';
  fill.style.width = '0px';
}

function initSlider() {
  const handle = document.getElementById('slideHandle');
  const area = document.getElementById('slideArea');

  function onStart(clientX) {
    sliding = true;
    startX = clientX;
    currentX = 5;
    slideMax = area.offsetWidth - handle.offsetWidth - 10;
    handle.style.transition = 'none';
    document.getElementById('slideFill').style.transition = 'none';
  }

  function onMove(clientX) {
    if (!sliding) return;
    const dx = clientX - startX;
    let newLeft = Math.min(Math.max(5, 5 + dx), slideMax + 5);
    handle.style.left = newLeft + 'px';
    document.getElementById('slideFill').style.width = (newLeft) + 'px';

    // completed
    if (newLeft >= slideMax) {
      sliding = false;
      completeSlide();
    }
  }

  function onEnd() {
    if (!sliding) return;
    sliding = false;
    const handle = document.getElementById('slideHandle');
    const fill = document.getElementById('slideFill');
    handle.style.transition = 'left 0.3s ease';
    fill.style.transition = 'width 0.3s ease';
    handle.style.left = '5px';
    fill.style.width = '0px';
  }

  // Touch
  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    onStart(e.touches[0].clientX);
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (sliding) {
      e.preventDefault();
      onMove(e.touches[0].clientX);
    }
  }, { passive: false });

  document.addEventListener('touchend', onEnd);

  // Mouse
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    onStart(e.clientX);
  });

  document.addEventListener('mousemove', e => {
    onMove(e.clientX);
  });

  document.addEventListener('mouseup', onEnd);
}

function completeSlide() {
  const now = new Date();
  const dtStr = formatUsedDatetime(now);
  setUsed(dtStr);

  // Update screen3 datetime
  document.getElementById('s3UsedDatetime').textContent = '使用日時: ' + dtStr;

  // Transition to screen3
  showScreen('screen3', 'screen2', 'forward');
}

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', () => {
  initScreen1();
  initGateScreens();
  initSlider();
});
