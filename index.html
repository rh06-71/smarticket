<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>スマートチケット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:#f0f0f0;display:flex;justify-content:center;min-height:100vh;}
#app{width:100%;max-width:390px;min-height:100vh;background:#f5f5f5;position:relative;overflow:hidden;}

/* ===== SCREENS ===== */
.screen{width:100%;min-height:100vh;position:absolute;top:0;left:0;background:#f5f5f5;transition:transform .3s ease,opacity .3s ease;}
.screen.hidden{transform:translateX(100%);pointer-events:none;}
.screen.out{transform:translateX(-25%);opacity:.5;pointer-events:none;}
#s1{overflow-y:auto;}

/* ===== SCREEN 1 ===== */
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10;}
.btn-back{background:none;border:none;color:#E91E8C;font-size:24px;font-weight:300;cursor:pointer;padding:2px 6px;line-height:1;}
.btn-enter{background:#E91E8C;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;letter-spacing:.3px;}

/* Event card */
.ev-card{background:#fff;margin:8px 10px 0;border-radius:8px 8px 0 0;padding:14px 14px 10px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.06);}
.ev-year{font-size:12px;color:#888;margin-bottom:2px;}
.ev-date-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ev-date{font-size:38px;font-weight:bold;color:#111;line-height:1.05;}
.ev-date-right{display:flex;flex-direction:column;padding-top:6px;}
.ev-day{font-size:14px;font-weight:bold;color:#111;}
.ev-times{font-size:12px;color:#444;line-height:1.9;white-space:nowrap;}
.ev-name{font-size:15px;font-weight:bold;color:#111;line-height:1.4;margin-bottom:3px;}
.ev-venue{font-size:12px;color:#888;}
.ev-menu{position:absolute;top:12px;right:12px;color:#E91E8C;font-size:20px;cursor:pointer;line-height:1;}

/* Name bar */
.name-bar{background:#E91E8C;margin:0 10px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;}
.name-bar .nm{color:#fff;font-size:17px;font-weight:bold;}
.name-bar .num{color:rgba(255,255,255,.75);font-size:12px;}

/* Ticket body */
.tkt-body{background:#fff;margin:0 10px;padding:14px;display:flex;align-items:flex-start;gap:12px;border-bottom:1.5px dashed #F48FB1;}
.tkt-icon-wrap{flex-shrink:0;text-align:center;}
.tkt-icon{display:block;margin:0 auto 5px;}
.badge-unused{display:inline-block;font-size:10px;font-weight:bold;color:#E53935;border:1.5px solid #E53935;border-radius:3px;padding:1px 5px;}
.badge-used{display:inline-block;font-size:10px;font-weight:bold;color:#888;border:1.5px solid #888;border-radius:3px;padding:1px 5px;}
.tkt-info{flex:1;position:relative;}
.tkt-type{font-size:17px;font-weight:bold;color:#111;margin-bottom:3px;}
.tkt-seat{font-size:13px;color:#444;margin-bottom:3px;line-height:1.6;}
.tkt-price{font-size:17px;font-weight:bold;color:#111;}
.stamp{position:absolute;right:0;top:50%;transform:translateY(-60%) rotate(15deg);color:#D32F2F;border:2.5px solid #D32F2F;border-radius:4px;padding:3px 7px;font-size:16px;font-weight:bold;opacity:.88;background:rgba(255,255,255,.55);white-space:nowrap;}

/* Distribute button */
.btn-dist{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px dashed #00A5A8;border-radius:6px;margin:8px 10px;padding:10px 14px;color:#00A5A8;font-size:13px;font-weight:bold;cursor:pointer;width:calc(100%-20px);}

/* Detail section */
.detail{background:#FFF5F7;margin:0 10px;padding:12px 14px;font-size:11px;color:#333;line-height:1.75;}
.detail-sep{border:none;border-top:1px dashed #F48FB1;margin:0 10px;}

/* Ticket number */
.tkt-num{margin:6px 10px 2px;font-size:12px;color:#E91E8C;font-weight:bold;}
.tkt-used-dt{margin:0 10px 6px;font-size:11px;color:#555;}
.link-back{display:block;margin:2px 10px 30px;font-size:12px;color:#E91E8C;text-decoration:none;}

/* Scroll top btn */
.btn-top{position:fixed;bottom:22px;right:calc(50% - 195px + 10px);width:38px;height:38px;border-radius:50%;background:#00A5A8;color:#fff;border:none;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:20;display:flex;align-items:center;justify-content:center;}

/* ===== SCREEN 2 ===== */
#s2{background:#111;display:flex;flex-direction:column;}
.s2-hdr{background:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.s2-hdr .cnt{font-size:14px;font-weight:bold;color:#111;}
.btn-x{width:30px;height:30px;border-radius:50%;background:#E91E8C;color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;}

.warn{background:#FFEB3B;padding:9px 14px;flex-shrink:0;}
.warn p{font-size:11.5px;color:#C62828;font-weight:bold;line-height:1.55;}

.ts-bar{background:#4DB6AC;padding:7px 12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:14px;}
.ts-txt{font-size:13px;color:#fff;font-weight:bold;letter-spacing:.5px;font-variant-numeric:tabular-nums;}
.ts-valid{font-size:10px;color:rgba(255,255,255,.85);}

.stars{display:flex;justify-content:center;gap:22px;padding:10px 0 2px;flex-shrink:0;}
.star{font-size:26px;color:#4CAF50;}
.star.off{opacity:.1;}

.gate-card{background:#fff;margin:10px 16px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 18px rgba(0,0,0,.4);}
.gate-top{background:linear-gradient(170deg,#5C9CE6 0%,#7B6FC4 45%,#D63AAF 100%);height:175px;display:flex;align-items:center;justify-content:center;}
.gate-lbl{font-size:50px;font-weight:900;color:#0D47A1;text-decoration:underline;letter-spacing:6px;}
.gate-nm{background:#4DB6AC;padding:9px 14px;}
.gate-nm span{font-size:15px;font-weight:bold;color:#fff;}
.gate-bot{background:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.chk{width:40px;height:40px;border-radius:50%;background:#E91E8C;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gate-type{font-size:14px;color:#333;}

/* Slider */
.slide-area{margin:12px 16px;flex-shrink:0;}
.slide-track{background:#2a2a2a;border-radius:28px;height:50px;position:relative;overflow:hidden;display:flex;align-items:center;border:1.5px solid #444;}
.slide-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#E91E8C,#ff79b8);border-radius:28px;width:0%;}
.slide-lbl{position:absolute;width:100%;text-align:center;color:rgba(255,255,255,.6);font-size:13px;font-weight:bold;pointer-events:none;z-index:1;}
.slide-thumb{width:46px;height:46px;border-radius:50%;background:#fff;position:absolute;left:2px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.4);user-select:none;z-index:2;}

/* ===== SCREEN 3 ===== */
#s3{background:#111;display:flex;flex-direction:column;}
.s3-card{background:#fff;margin:10px 14px;border-radius:12px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.4);}
.s3-valid{padding:14px;text-align:center;border-bottom:1px solid #eee;}
.s3-valid h3{font-size:14px;font-weight:bold;color:#333;margin-bottom:7px;}
.s3-stars{display:flex;justify-content:center;gap:12px;}
.s3-star{font-size:22px;color:#4CAF50;}
.s3-ev{padding:9px 14px;border-bottom:1px solid #f5f5f5;}
.s3-ev-name{font-size:13px;font-weight:bold;color:#333;}
.s3-ev-sub{font-size:11px;color:#888;}
.s3-nm{background:#FCE4EC;padding:9px 14px;}
.s3-nm span{font-size:14px;font-weight:bold;color:#C2185B;}
.s3-row{padding:12px 14px;display:flex;align-items:center;gap:10px;position:relative;}
.s3-ico{flex-shrink:0;opacity:.4;filter:grayscale(1);}
.s3-info{}
.s3-badge{display:inline-block;font-size:10px;color:#888;border:1.5px solid #888;border-radius:3px;padding:1px 5px;margin-bottom:4px;}
.s3-type{font-size:14px;color:#333;}
.s3-stamp{position:absolute;right:14px;top:50%;transform:translateY(-50%) rotate(15deg);color:#D32F2F;border:2.5px solid #D32F2F;border-radius:4px;padding:3px 8px;font-size:18px;font-weight:bold;opacity:.88;background:rgba(255,255,255,.6);}
.s3-date{padding:4px 14px 14px;font-size:11px;color:#888;}
</style>
</head>
<body>
<div id="app">

<!-- SCREEN 1 -->
<div class="screen" id="s1">
  <div class="hdr">
    <button class="btn-back">＜</button>
    <button class="btn-enter" id="btnEnter">入場画面に進む</button>
  </div>

  <div class="ev-card">
    <div class="ev-year" id="evYear"></div>
    <div class="ev-date-row">
      <div class="ev-date" id="evDate"></div>
      <div class="ev-date-right">
        <div class="ev-day" id="evDay"></div>
        <div class="ev-times" id="evTimes"></div>
      </div>
    </div>
    <div class="ev-name" id="evName"></div>
    <div class="ev-venue" id="evVenue"></div>
    <span class="ev-menu">…</span>
  </div>

  <div class="name-bar">
    <span class="nm" id="s1Name"></span>
    <span class="num">1枚目</span>
  </div>

  <div class="tkt-body">
    <div class="tkt-icon-wrap">
      <!-- ピンクのチケットアイコン（横長半券型） -->
      <!-- 丸い背景+白チケット型アイコン -->
      <svg class="tkt-icon" id="s1Ico" width="64" height="64" viewBox="0 0 64 64">
        <!-- 円形背景 -->
        <circle cx="32" cy="32" r="30" fill="#E91E8C"/>
        <!-- 白いチケット型（横長・左右に半円切り欠き） -->
        <rect x="10" y="22" width="44" height="20" rx="2" fill="white"/>
        <circle cx="10" cy="32" r="4" fill="#E91E8C"/>
        <circle cx="54" cy="32" r="4" fill="#E91E8C"/>
        <!-- ミシン目 -->
        <line x1="20" y1="22" x2="20" y2="42" stroke="#E91E8C" stroke-width="1" stroke-dasharray="2,2"/>
        <!-- 暗い帯 -->
        <rect x="11" y="23" width="7" height="18" rx="1" fill="rgba(0,0,0,.2)"/>
      </svg>
      <span class="badge-unused" id="s1Badge">未使用</span>
    </div>
    <div class="tkt-info" id="tktInfo">
      <div class="tkt-type" id="s1Type"></div>
      <div class="tkt-seat" id="s1Seat"></div>
      <div class="tkt-price" id="s1Price"></div>
      <div class="stamp" id="s1Stamp" style="display:none">使用済</div>
    </div>
  </div>

  <button class="btn-dist" id="btnDist">
    <svg width="20" height="16" viewBox="0 0 20 16"><path d="M2 2h10v3l5-5-5-5v3H2v4zm16 4H8v-3l-5 5 5 5v-3h10V6z" fill="#00A5A8"/></svg>
    同行者へ分配する
  </button>

  <hr class="detail-sep">

  <div class="detail" id="detailText"></div>

  <div class="tkt-num" id="s1TktNum"></div>
  <div class="tkt-used-dt" id="s1UsedDt" style="display:none"></div>
  <a href="#" class="link-back">チケット裏面情報 ›</a>

  <button class="btn-top" onclick="document.getElementById('s1').scrollTop=0">↑</button>
</div>

<!-- SCREEN 2 -->
<div class="screen hidden" id="s2">
  <div class="s2-hdr">
    <span class="cnt">1/1枚 選択中</span>
    <button class="btn-x" id="btnX2">×</button>
  </div>
  <div class="warn">
    <p>⚠ スライドすると使用済になります。</p>
    <p>使用済チケットは、入場・再発行不可</p>
  </div>
  <div class="ts-bar">
    <span class="ts-txt" id="ts1">----/--/-- (-) --:--:--.---</span>
    <span class="ts-valid">期間中有効</span>
  </div>
  <div class="stars">
    <span class="star" id="st1">★</span>
    <span class="star" id="st2">★</span>
    <span class="star" id="st3">★</span>
  </div>
  <div class="gate-card">
    <div class="gate-top"><span class="gate-lbl">GATE</span></div>
    <div class="gate-nm"><span id="s2Name"></span></div>
    <div class="gate-bot">
      <div class="chk">✓</div>
      <span class="gate-type" id="s2Type"></span>
    </div>
  </div>
  <div class="slide-area">
    <div class="slide-track" id="slTrack">
      <div class="slide-fill" id="slFill"></div>
      <span class="slide-lbl">← スライドして入場 →</span>
      <div class="slide-thumb" id="slThumb">›</div>
    </div>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen hidden" id="s3">
  <div class="s2-hdr">
    <span class="cnt">0/1枚 選択中</span>
    <button class="btn-x" id="btnX3">×</button>
  </div>
  <div class="ts-bar">
    <span class="ts-txt" id="ts2">----/--/-- (-) --:--:--.---</span>
    <span class="ts-valid">期間中有効</span>
  </div>
  <div class="s3-card">
    <div class="s3-valid">
      <h3>期間中有効</h3>
      <div class="s3-stars"><span class="s3-star">★</span><span class="s3-star">★</span></div>
    </div>
    <div class="s3-ev">
      <div class="s3-ev-name" id="s3Name"></div>
      <div class="s3-ev-sub" id="s3Sub"></div>
    </div>
    <div class="s3-nm"><span id="s3NmSpan"></span></div>
    <div class="s3-row">
      <div class="s3-ico">
        <svg width="50" height="50" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="30" fill="#ccc"/>
          <rect x="10" y="22" width="44" height="20" rx="2" fill="white" opacity=".7"/>
          <circle cx="10" cy="32" r="4" fill="#ccc"/>
          <circle cx="54" cy="32" r="4" fill="#ccc"/>
          <line x1="20" y1="22" x2="20" y2="42" stroke="#ccc" stroke-width="1" stroke-dasharray="2,2"/>
          <rect x="11" y="23" width="7" height="18" rx="1" fill="rgba(0,0,0,.15)"/>
        </svg>
      </div>
      <div class="s3-info">
        <span class="s3-badge">入場済</span>
        <div class="s3-type" id="s3Type"></div>
      </div>
      <div class="s3-stamp">使用済</div>
    </div>
    <div class="s3-date" id="s3Date"></div>
  </div>
</div>

</div><!-- /app -->

<script>
const P = new URLSearchParams(location.search);
const D = {
  name:  P.get('name')  || '薮下 柊',
  event: P.get('event') || '第6回 AKB48グループ歌唱力No.1決定戦 ファイナリストLIVE',
  venue: P.get('venue') || 'TACHIKAWA STAGE GARDEN',
  date:  P.get('date')  || '2025/2/18',
  day:   P.get('day')   || '火',
  open:  P.get('open')  || '18:00',
  start: P.get('start') || '19:00',
  type:  P.get('type')  || '指定席',
  floor: P.get('floor') || '1階',
  row:   P.get('row')   || '18列',
  num:   P.get('num')   || '5番',
  price: P.get('price') || '8800',
  tnum:  P.get('ticket_num') || '1160027394397',
};

const dp = D.date.split('/');
const WD = ['日','月','火','水','木','金','土'];

// Fill screen 1
document.getElementById('evYear').textContent = dp[0] + '年';
document.getElementById('evDate').textContent = dp[1] + '/' + dp[2];
document.getElementById('evDay').textContent = '（' + D.day + '）';
document.getElementById('evTimes').innerHTML = D.open + ' 開場<br>' + D.start + ' 開演';
document.getElementById('evName').textContent = D.event;
document.getElementById('evVenue').textContent = D.venue;
document.getElementById('s1Name').textContent = D.name + ' 様';
document.getElementById('s1Type').textContent = D.type;
document.getElementById('s1Seat').innerHTML = D.floor + '<br>' + D.row + ' ' + D.num;
document.getElementById('s1Price').textContent = '¥' + Number(D.price).toLocaleString() + '（税込）';
document.getElementById('detailText').innerHTML =
  D.event + '<br>Supported by ひかりTV<br>主催/制作：TBSテレビ<br>公演問合せ：AKB48グループ 歌唱力No.1決定戦 運営本部<br>※お一人様1枚ずつチケット必要※未就学児入場不可※小学生以下の方要保護者同伴※入場時、持ち物検査と金属探知機による身体検査等を実施する場合有※譲渡および転売禁止※お客様氏名が記載のチケット、主催者指定の「本人確認書類」を使用して本人確認実施。同伴者の方も全員チケットと主催者指定の本人確認書類要持参。<br>イープラス 050-3185-6483';
document.getElementById('s1TktNum').textContent = 'チケット番号: ' + D.tnum;

// Screen 2 & 3
document.getElementById('s2Name').textContent = D.name + ' 様';
document.getElementById('s2Type').textContent = D.type;
document.getElementById('s3Name').textContent = D.event;
document.getElementById('s3Sub').textContent = D.venue;
document.getElementById('s3NmSpan').textContent = D.name + ' 様';
document.getElementById('s3Type').textContent = D.type;

// Used state
let used = sessionStorage.getItem('used') === '1';
let usedAt = sessionStorage.getItem('usedAt') || '';

function applyUsed() {
  if (!used) return;
  // Icon gray
  const ico = document.getElementById('s1Ico');
  ico.style.filter = 'grayscale(1)';
  ico.style.opacity = '.5';
  // Badge
  const b = document.getElementById('s1Badge');
  b.textContent = '入場済'; b.className = 'badge-used';
  // Stamp
  document.getElementById('s1Stamp').style.display = 'block';
  // Used date
  const udt = document.getElementById('s1UsedDt');
  udt.textContent = '使用日時: ' + usedAt;
  udt.style.display = 'block';
  // Hide distribute
  document.getElementById('btnDist').style.display = 'none';
}
applyUsed();

// Timestamp
function fmtTs() {
  const n = new Date();
  const pad = (v,l=2) => String(v).padStart(l,'0');
  return n.getFullYear()+'/'+pad(n.getMonth()+1)+'/'+pad(n.getDate())+
    ' ('+WD[n.getDay()]+') '+pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds())+'.'+pad(n.getMilliseconds(),3);
}
setInterval(() => {
  const t = fmtTs();
  document.getElementById('ts1').textContent = t;
  document.getElementById('ts2').textContent = t;
}, 80);

// Stars blink
[['st1',500],['st2',730],['st3',970]].forEach(([id,ms]) => {
  setInterval(() => document.getElementById(id).classList.toggle('off'), ms);
});

// Screen transitions
const S1 = document.getElementById('s1');
const S2 = document.getElementById('s2');
const S3 = document.getElementById('s3');

document.getElementById('btnEnter').onclick = () => { S1.classList.add('out'); S2.classList.remove('hidden'); };
document.getElementById('btnX2').onclick = () => { S2.classList.add('hidden'); S2.classList.remove('out'); S1.classList.remove('out'); };
document.getElementById('btnX3').onclick = () => {
  S3.classList.add('hidden'); S3.classList.remove('out');
  S2.classList.add('hidden'); S2.classList.remove('out');
  S1.classList.remove('out');
  applyUsed();
};

// Slider
const track = document.getElementById('slTrack');
const fill  = document.getElementById('slFill');
const thumb = document.getElementById('slThumb');
let drag = false;

function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }
function startDrag(e) { drag = true; e.preventDefault(); }
function moveDrag(e) {
  if (!drag) return;
  const r = track.getBoundingClientRect();
  const max = r.width - 50;
  const x = Math.min(Math.max(0, getX(e) - r.left - 25), max);
  thumb.style.left = x + 'px';
  fill.style.width = (x / max * 100) + '%';
  if (x >= max - 2) endDrag(true);
}
function endDrag(done) {
  if (!drag) return; drag = false;
  if (!done) {
    thumb.style.transition = 'left .2s'; fill.style.transition = 'width .2s';
    thumb.style.left = '2px'; fill.style.width = '0%';
    setTimeout(() => { thumb.style.transition = ''; fill.style.transition = ''; }, 220);
  } else {
    setTimeout(() => {
      // Mark used
      used = true;
      const n = new Date();
      const pad = v => String(v).padStart(2,'0');
      usedAt = n.getFullYear()+'/'+pad(n.getMonth()+1)+'/'+pad(n.getDate())+'('+WD[n.getDay()]+') '+pad(n.getHours())+':'+pad(n.getMinutes());
      sessionStorage.setItem('used','1');
      sessionStorage.setItem('usedAt', usedAt);
      document.getElementById('s3Date').textContent = '使用日時: ' + usedAt;
      S2.classList.add('out'); S3.classList.remove('hidden');
    }, 150);
  }
}

thumb.addEventListener('mousedown', startDrag);
document.addEventListener('mousemove', moveDrag);
document.addEventListener('mouseup', () => endDrag(false));
thumb.addEventListener('touchstart', startDrag, {passive:false});
document.addEventListener('touchmove', moveDrag, {passive:true});
document.addEventListener('touchend', () => endDrag(false));
</script>
