<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>スマートチケット</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
body { margin: 0; }
* { -webkit-tap-highlight-color: transparent; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.star-blink { animation: blink 0.8s ease-in-out infinite; }
.star-blink2 { animation: blink 1.1s ease-in-out infinite 0.3s; }
.star-blink3 { animation: blink 0.9s ease-in-out infinite 0.6s; }
.star-blink4 { animation: blink 1.3s ease-in-out infinite 0.1s; }
.star-blink5 { animation: blink 0.7s ease-in-out infinite 0.9s; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SmartTicketApp = () => {
  const [currentView, setCurrentView] = useState('detail');
  const [isUsed, setIsUsed] = useState(false);
  const [usedTime, setUsedTime] = useState(null);

  // URLパラメーター対応
  const params = new URLSearchParams(window.location.search);
  const ticketName = params.get('name') || '東久保 慶樹';
  const eventName = params.get('event') || 'イープラス劇団 第1回公演';
  const venueName = params.get('venue') || '東京武道館';

  const handleUsed = (timeStr) => {
    setUsedTime(timeStr);
    setIsUsed(true);
    setCurrentView('used');
  };

  const handleUsedClose = () => {
    setCurrentView('detail');
  };

  const formatTimestamp = (now) => {
    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    const days = ['日','月','火','水','木','金','土'];
    const dow = days[now.getDay()];
    const h = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
    return `${y}/${mo}/${d} (${dow}) ${h}:${mi}:${s}.${ms}`;
  };

  const formatShortTime = (now) => {
    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    const days = ['日','月','火','水','木','金','土'];
    const dow = days[now.getDay()];
    const h = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    return `${y}/${mo}/${d}(${dow}) ${h}:${mi}`;
  };

  // ─── DetailView ───────────────────────────────────────────────────────────
  const DetailView = () => (
    <div className="min-h-screen bg-gray-50">
      {/* ヘッダー */}
      <div className="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-200">
        <button className="text-2xl font-bold" style={{ color: '#E91E8C' }}>＜</button>
        <button
          onClick={() => setCurrentView('selection')}
          className="text-white px-6 py-2 rounded-full font-medium text-sm"
          style={{ backgroundColor: '#E91E8C' }}
        >入場画面に進む</button>
      </div>

      {/* イベントカード */}
      <div className="bg-white rounded-lg mx-4 mt-4 p-4 shadow-sm">
        <div className="flex items-start justify-between mb-3">
          <div className="flex-1">
            <div className="text-gray-500 text-xs mb-2">2025年</div>
            <div className="flex items-baseline mb-2">
              <span className="text-4xl font-bold text-black">2/18</span>
              <span className="text-sm font-bold text-black ml-2">(火)</span>
            </div>
          </div>
          <div className="text-right">
            <div className="text-xs text-gray-700">18:00 開場</div>
            <div className="text-xs text-gray-700">19:00 開演</div>
          </div>
          <button className="text-gray-400 text-xl ml-2">…</button>
        </div>
        <div className="text-base font-bold text-black mb-1">{eventName}</div>
        <div className="text-xs text-gray-500">{venueName}</div>
      </div>

      {/* 名前バー + チケット本体 */}
      <div className="mx-4 mt-4">
        <div className="text-white font-bold px-4 py-3 rounded-t-lg flex items-center justify-between"
          style={{ backgroundColor: '#E91E8C' }}>
          <span className="text-base">{ticketName} 様</span>
          <span className="text-xs">1枚目</span>
        </div>

        {/* チケット本体 */}
        <div className="bg-white px-4 py-4 border-b-2 border-dashed relative"
          style={{ borderColor: '#E91E8C' }}>
          <div className="flex items-start">
            {/* 左: アイコン */}
            <div className="mr-4">
              <div className="w-16 h-16 rounded-full flex items-center justify-center"
                style={{ backgroundColor: isUsed ? '#e0e0e0' : '#FCE4EC' }}>
                <div className="w-8 h-10 rounded flex items-center justify-center"
                  style={{ backgroundColor: isUsed ? '#9e9e9e' : '#E91E8C' }}>
                  <div className="w-4 h-4 bg-white rounded-sm"></div>
                </div>
              </div>
              <div className="text-white text-xs px-2 py-1 rounded text-center mt-2 font-medium"
                style={{ backgroundColor: isUsed ? '#9e9e9e' : '#E91E8C' }}>
                {isUsed ? '入場済' : '未使用'}
              </div>
            </div>
            {/* 右: チケット情報 */}
            <div className="flex-1">
              <div className="text-base font-bold text-black mb-1">指定席</div>
              <div className="text-sm text-gray-700 mb-1">1階</div>
              <div className="text-sm text-gray-700 mb-2">25列 10番</div>
              <div className="text-base font-bold text-black">¥8,800(税込)</div>
            </div>
            {/* 使用済スタンプ */}
            {isUsed && (
              <div style={{
                position: 'absolute', top: '16px', right: '16px',
                border: '3px solid #e53935', color: '#e53935',
                padding: '4px 10px', fontSize: '20px', fontWeight: 'bold',
                transform: 'rotate(-15deg)', borderRadius: '4px', opacity: 0.85,
              }}>使用済</div>
            )}
          </div>
          {isUsed && usedTime && (
            <div className="mt-2 text-xs text-gray-500">使用日時: {usedTime}</div>
          )}
        </div>

        {/* 同行者へ分配するボタン */}
        <div className="bg-white px-4 py-3 rounded-b-lg border-2 border-dashed"
          style={{ borderColor: '#E91E8C' }}>
          <button className="flex items-center text-sm font-medium" style={{ color: '#00A5A8' }}>
            <svg className="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"/>
            </svg>
            同行者へ分配する
          </button>
        </div>
      </div>

      {/* 詳細テキストエリア */}
      <div className="mx-4 mt-4 p-4 rounded-lg text-xs" style={{ backgroundColor: '#FCE4EC', lineHeight: '1.75' }}>
        <div className="mb-2">イープラス劇団ワールドツアー</div>
        <div className="mb-2">■主催：イープラス劇団プロダクション</div>
        <div className="mb-2">■企画制作：恵比寿CORPORATION</div>
        <div className="mb-3" style={{ fontSize: '10px' }}>※チケットの紛失/盗難/お忘れなどいかなる理由でも再発行不可。（本券がないと入場できません）チケットは大切に保管してください。</div>
        <div className="mb-2" style={{ fontSize: '10px' }}>＜営利目的の転売禁止＞</div>
        <div className="mb-3">e+（イープラス）</div>
        <div className="font-medium mb-2" style={{ color: '#E91E8C' }}>チケット裏面情報 ›</div>
        <div className="font-medium" style={{ color: '#E91E8C' }}>チケット番号: 1160027394397</div>
      </div>

      {/* 右下の↑ボタン */}
      <div className="fixed bottom-6 right-6">
        <button className="w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg"
          style={{ backgroundColor: '#00A5A8' }}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18"/>
          </svg>
        </button>
      </div>
    </div>
  );

  // ─── SelectionView (GATE入場画面) ─────────────────────────────────────────
  const SelectionView = () => {
    const [time, setTime] = useState(formatTimestamp(new Date()));
    const [sliderX, setSliderX] = useState(0);
    const sliderTrackRef = useRef(null);
    const isDragging = useRef(false);
    const dragStartClientX = useRef(0);
    const currentSliderX = useRef(0);
    const THUMB = 52;

    useEffect(() => {
      const id = setInterval(() => setTime(formatTimestamp(new Date())), 10);
      return () => clearInterval(id);
    }, []);

    const getMaxX = () =>
      sliderTrackRef.current ? sliderTrackRef.current.clientWidth - THUMB : 280;

    const onDragStart = (clientX) => {
      isDragging.current = true;
      dragStartClientX.current = clientX - currentSliderX.current;
    };

    const onDragMove = (clientX) => {
      if (!isDragging.current) return;
      const maxX = getMaxX();
      let nx = clientX - dragStartClientX.current;
      nx = Math.max(0, Math.min(nx, maxX));
      currentSliderX.current = nx;
      setSliderX(nx);
      if (nx >= maxX - 4) {
        isDragging.current = false;
        handleUsed(formatShortTime(new Date()));
      }
    };

    const onDragEnd = () => {
      if (isDragging.current) {
        isDragging.current = false;
        currentSliderX.current = 0;
        setSliderX(0);
      }
    };

    const progress = sliderTrackRef.current
      ? sliderX / (sliderTrackRef.current.clientWidth - THUMB)
      : 0;

    return (
      <div
        style={{ minHeight: '100vh', background: '#0d1117', userSelect: 'none', display: 'flex', flexDirection: 'column' }}
        onMouseMove={(e) => onDragMove(e.clientX)}
        onMouseUp={onDragEnd}
        onMouseLeave={onDragEnd}
        onTouchMove={(e) => { e.preventDefault(); onDragMove(e.touches[0].clientX); }}
        onTouchEnd={onDragEnd}
      >
        {/* 戻るボタン */}
        <button
          onClick={() => setCurrentView('detail')}
          style={{
            position: 'absolute', top: '52px', left: '12px', zIndex: 10,
            background: 'none', border: 'none', color: '#aaa', fontSize: '22px', cursor: 'pointer', padding: '4px 8px',
          }}
        >＜</button>

        {/* 警告バナー */}
        <div style={{
          backgroundColor: '#ffd600', padding: '10px 16px',
          fontSize: '13px', fontWeight: 'bold', color: '#333', lineHeight: 1.5,
        }}>
          スライドすると使用済みになります。<br/>
          使用済チケットは、入場・再発行不可
        </div>

        {/* タイムスタンプ */}
        <div style={{
          backgroundColor: '#00A5A8', color: 'white', textAlign: 'center',
          padding: '8px 16px', fontSize: '15px', fontWeight: 'bold', letterSpacing: '0.5px',
        }}>
          {time}
        </div>

        {/* GATE エリア */}
        <div style={{
          backgroundColor: '#1565C0', padding: '32px 20px 28px', textAlign: 'center', position: 'relative',
        }}>
          {/* 点滅する星 */}
          <div style={{ position: 'absolute', top: '14px', left: '0', right: '0', display: 'flex', justifyContent: 'center', gap: '28px' }}>
            <span className="star-blink"  style={{ fontSize: '22px', color: '#E91E8C' }}>★</span>
            <span className="star-blink2" style={{ fontSize: '22px', color: '#E91E8C' }}>★</span>
            <span className="star-blink3" style={{ fontSize: '22px', color: '#E91E8C' }}>★</span>
            <span className="star-blink4" style={{ fontSize: '22px', color: '#E91E8C' }}>★</span>
            <span className="star-blink5" style={{ fontSize: '22px', color: '#E91E8C' }}>★</span>
          </div>
          <div style={{
            fontSize: '80px', fontWeight: 900, color: '#00BCD4',
            letterSpacing: '12px', textShadow: '0 0 24px #00BCD4, 0 0 48px #0288d1',
            lineHeight: 1,
          }}>GATE</div>
        </div>

        {/* 名前 + チケット情報 */}
        <div style={{ backgroundColor: '#E91E8C', padding: '0' }}>
          <div style={{
            borderBottom: '1px solid rgba(255,255,255,0.3)',
            padding: '14px 20px',
          }}>
            <span style={{ color: 'white', fontSize: '18px', fontWeight: 'bold' }}>{ticketName} 様</span>
          </div>
          <div style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', gap: '16px' }}>
            <div style={{
              width: '48px', height: '48px', borderRadius: '50%', backgroundColor: 'white',
              display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
            }}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="12" fill="#E91E8C"/>
                <path d="M6 12l4 4 8-8" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <span style={{ color: 'white', fontSize: '17px', fontWeight: 'bold' }}>指定席</span>
          </div>
        </div>

        {/* スライダーエリア */}
        <div style={{
          flex: 1, backgroundColor: '#0d1117',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          padding: '32px 20px',
        }}>
          <div style={{ color: '#666', fontSize: '12px', marginBottom: '14px', letterSpacing: '0.5px' }}>
            を右にスライドして入場
          </div>
          <div
            ref={sliderTrackRef}
            style={{
              width: '100%', maxWidth: '340px', height: `${THUMB}px`,
              backgroundColor: '#1e1e2e', borderRadius: `${THUMB}px`,
              position: 'relative', overflow: 'hidden',
            }}
          >
            {/* 進捗フィル */}
            <div style={{
              position: 'absolute', left: 0, top: 0, bottom: 0,
              width: `${sliderX + THUMB}px`,
              background: 'linear-gradient(90deg, #880E4F, #E91E8C)',
              borderRadius: `${THUMB}px`,
            }} />
            {/* ラベル */}
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: progress > 0.35 ? 'transparent' : '#555',
              fontSize: '13px', pointerEvents: 'none', transition: 'color 0.2s',
            }}>
              スライドして入場 ›
            </div>
            {/* サム（桜） */}
            <div
              style={{
                position: 'absolute',
                left: `${sliderX}px`, top: 0,
                width: `${THUMB}px`, height: `${THUMB}px`,
                borderRadius: '50%', backgroundColor: 'white',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '26px', cursor: 'grab', zIndex: 2,
                boxShadow: '0 2px 12px rgba(0,0,0,0.6)',
              }}
              onMouseDown={(e) => { e.preventDefault(); onDragStart(e.clientX); }}
              onTouchStart={(e) => { onDragStart(e.touches[0].clientX); }}
            >🌸</div>
          </div>
        </div>
      </div>
    );
  };

  // ─── UsedView (使用済み確認画面) ──────────────────────────────────────────
  const UsedView = () => {
    const [time, setTime] = useState(formatTimestamp(new Date()));

    useEffect(() => {
      const id = setInterval(() => setTime(formatTimestamp(new Date())), 10);
      return () => clearInterval(id);
    }, []);

    return (
      <div style={{ minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
        {/* ヘッダー */}
        <div style={{
          backgroundColor: 'white', display: 'flex', alignItems: 'center',
          justifyContent: 'space-between', padding: '12px 16px',
          borderBottom: '1px solid #e0e0e0',
        }}>
          <span style={{ fontSize: '14px', color: '#555' }}>0/1枚 選択中</span>
          <button onClick={handleUsedClose} style={{
            background: 'none', border: 'none', fontSize: '24px', color: '#777', cursor: 'pointer', lineHeight: 1,
          }}>×</button>
        </div>

        {/* タイムスタンプ */}
        <div style={{
          backgroundColor: '#00A5A8', color: 'white', textAlign: 'center',
          padding: '8px 16px', fontSize: '15px', fontWeight: 'bold',
        }}>
          {time}
        </div>

        {/* カード */}
        <div style={{ margin: '16px', backgroundColor: 'white', borderRadius: '8px', overflow: 'hidden', boxShadow: '0 1px 4px rgba(0,0,0,0.12)' }}>
          {/* 上部情報 */}
          <div style={{ padding: '16px', textAlign: 'center' }}>
            <div style={{ fontSize: '13px', fontWeight: 'bold', color: '#555', marginBottom: '12px' }}>期間中有効</div>
            {/* 点滅する星 */}
            <div style={{ display: 'flex', justifyContent: 'center', gap: '48px', marginBottom: '12px' }}>
              <span className="star-blink"  style={{ fontSize: '44px', color: '#4CAF50' }}>★</span>
              <span className="star-blink2" style={{ fontSize: '44px', color: '#4CAF50' }}>★</span>
            </div>
            <div style={{ fontSize: '15px', fontWeight: 'bold', color: '#333', marginBottom: '4px' }}>{eventName}</div>
            <div style={{ fontSize: '12px', color: '#888' }}>{venueName}</div>
          </div>

          {/* 名前バー */}
          <div style={{ backgroundColor: '#E91E8C', padding: '12px 16px' }}>
            <span style={{ color: 'white', fontWeight: 'bold', fontSize: '16px' }}>{ticketName} 様</span>
          </div>

          {/* チケット情報 */}
          <div style={{ backgroundColor: '#f0f0f0', padding: '16px', position: 'relative' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
              <div style={{ flexShrink: 0 }}>
                <div style={{
                  width: '52px', height: '52px', borderRadius: '50%', backgroundColor: '#bdbdbd',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <div style={{ width: '28px', height: '34px', borderRadius: '4px', backgroundColor: '#9e9e9e', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div style={{ width: '12px', height: '12px', backgroundColor: 'white', borderRadius: '2px' }}></div>
                  </div>
                </div>
                <div style={{
                  backgroundColor: '#9e9e9e', color: 'white', fontSize: '10px', fontWeight: 'bold',
                  textAlign: 'center', borderRadius: '3px', padding: '2px 4px', marginTop: '4px',
                }}>入場済</div>
              </div>
              <div>
                <div style={{ fontSize: '15px', fontWeight: 'bold', color: '#333' }}>指定席</div>
                <div style={{ fontSize: '12px', color: '#666', marginTop: '2px' }}>1階 25列 10番</div>
              </div>
            </div>
            {/* 使用済スタンプ */}
            <div style={{
              position: 'absolute', right: '16px', top: '50%',
              transform: 'translateY(-50%) rotate(-15deg)',
              border: '3px solid #e53935', color: '#e53935',
              padding: '5px 10px', fontSize: '22px', fontWeight: 'bold',
              borderRadius: '4px', opacity: 0.85, whiteSpace: 'nowrap',
            }}>使用済</div>
          </div>

          {/* 使用日時 */}
          <div style={{ backgroundColor: 'white', padding: '12px 16px' }}>
            <div style={{ fontSize: '12px', color: '#666' }}>使用日時: {usedTime}</div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{ maxWidth: '390px', margin: '0 auto', backgroundColor: 'white', minHeight: '100vh' }}>
      {currentView === 'detail'    && <DetailView />}
      {currentView === 'selection' && <SelectionView />}
      {currentView === 'used'      && <UsedView />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SmartTicketApp />);
</script>
</body>
</html>
