<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>スマートチケット</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
@keyframes stampIn { 0%{opacity:0;transform:rotate(12deg) scale(1.4)} 100%{opacity:1;transform:rotate(12deg) scale(1)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SmartTicketApp = () => {
  const [currentView, setCurrentView] = useState('detail');
  const [animationPhase, setAnimationPhase] = useState(0);
  const [starDrag, setStarDrag] = useState({ isDragging: false, startX: 0, currentX: 0 });
  const leftStarRef = useRef(null);

  useEffect(() => {
    if (starDrag.isDragging) return;
    const deltaX = starDrag.currentX - starDrag.startX;
    if (deltaX > 80 && starDrag.currentX !== starDrag.startX) {
      setCurrentView('gateAnimation');
      setAnimationPhase(0);
      setStarDrag({ isDragging: false, startX: 0, currentX: 0 });
      setTimeout(() => setAnimationPhase(1), 1500);
      setTimeout(() => setAnimationPhase(2), 3000);
      setTimeout(() => setCurrentView('used'), 4500);
    }
  }, [starDrag.isDragging, starDrag.currentX, starDrag.startX]);

  const handleStarTouchStart = (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    setStarDrag({ isDragging: true, startX: touch.clientX, currentX: touch.clientX });
  };
  const handleStarTouchMove = (e) => {
    if (!starDrag.isDragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    setStarDrag(prev => ({ ...prev, currentX: touch.clientX }));
  };
  const handleStarTouchEnd = (e) => {
    e.preventDefault();
    setStarDrag(prev => ({ ...prev, isDragging: false }));
  };
  const handleStarMouseDown = (e) => {
    e.preventDefault();
    setStarDrag({ isDragging: true, startX: e.clientX, currentX: e.clientX });
  };
  const handleStarMouseMove = (e) => {
    if (!starDrag.isDragging) return;
    e.preventDefault();
    setStarDrag(prev => ({ ...prev, currentX: e.clientX }));
  };
  const handleStarMouseUp = () => {
    setStarDrag(prev => ({ ...prev, isDragging: false }));
  };
  useEffect(() => {
    if (starDrag.isDragging) {
      document.addEventListener('mousemove', handleStarMouseMove);
      document.addEventListener('mouseup', handleStarMouseUp);
    }
    return () => {
      document.removeEventListener('mousemove', handleStarMouseMove);
      document.removeEventListener('mouseup', handleStarMouseUp);
    };
  }, [starDrag.isDragging]);

  const dragOffset = Math.min(Math.max(starDrag.currentX - starDrag.startX, 0), 140);

  // ======== 詳細画面 ========
  const DetailView = () => (
    <div className="min-h-screen" style={{ backgroundColor: '#F5F5F5' }}>
      <div className="bg-white px-4 py-3 flex items-center justify-between">
        <button onClick={() => setCurrentView('selection')} className="text-2xl" style={{ color: '#00A7A0' }}>＜</button>
        <button onClick={() => setCurrentView('selection')} className="text-white px-5 py-2 text-sm font-medium" style={{ backgroundColor: '#E91E8C', borderRadius: '20px' }}>入場画面に進む</button>
      </div>

      <div className="px-4 py-4">
        <div className="bg-white rounded-lg p-4 mb-3 relative">
          <div className="text-xs text-gray-600 mb-2">2024年</div>
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-baseline">
              <span className="text-5xl font-bold mr-2">2/3</span>
              <span className="text-sm font-medium">(土)</span>
            </div>
            <div className="text-right text-xs">
              <div className="mb-1">08:00 開場</div>
              <div>09:00 開演</div>
            </div>
            <button className="text-gray-400 text-xl absolute top-4 right-4">⋯</button>
          </div>
          <div className="text-sm font-bold mb-1">遊戯王デュエルモンスターズ 決闘者伝説（The Legend of Duelist）QUARTER CENTURY</div>
          <div className="text-xs text-gray-500">東京ドーム</div>
        </div>

        <div style={{ backgroundColor: '#0066CC' }} className="rounded-t-lg px-4 py-3 flex items-center justify-between">
          <span className="text-white font-bold text-base">吉村 晃 様</span>
          <span className="text-white text-xs">1枚目</span>
        </div>

        <div style={{ backgroundColor: '#FFE4F0' }} className="px-4 pt-4 pb-3">
          <div className="flex items-start">
            <div className="mr-4">
              <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-2">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
                  <rect x="5" y="3" width="14" height="18" rx="2" fill="#E91E8C"/>
                  <rect x="8" y="7" width="8" height="5" rx="1" fill="white"/>
                  <line x1="8" y1="14" x2="16" y2="14" stroke="white" strokeWidth="1.2"/>
                  <line x1="8" y1="17" x2="16" y2="17" stroke="white" strokeWidth="1.2"/>
                </svg>
              </div>
              <div className="text-center text-xs font-bold px-3 py-1 rounded" style={{ backgroundColor: '#E91E8C', color: 'white' }}>未使用</div>
            </div>
            <div className="flex-1">
              <div className="text-sm font-bold mb-1">通常・一般席アリーナ14時</div>
              <div className="text-xs mb-1">41ゲート 10通路 2階3塁側</div>
              <div className="text-sm font-bold mb-2">20列 191番</div>
              <div className="text-base font-bold">¥3,300(税込)</div>
            </div>
          </div>

          <button className="w-full mt-3 py-2 rounded flex items-center justify-center text-sm font-medium border-2 border-dashed bg-white" style={{ borderColor: '#E91E8C', color: '#00A7A0' }}>
            <svg className="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"/>
            </svg>
            同行者へ分配する
          </button>
        </div>

        <div style={{ backgroundColor: '#FFE4F0' }} className="px-4 py-3 rounded-b-lg text-xs leading-relaxed">
          <div className="mb-1">遊戯王デュエルモンスターズ</div>
          <div className="mb-1">決闘者伝説(The Legend of Duelist) QUARTER CENTURY</div>
          <div className="mb-1">主催:株式会社コナミデジタルエンタテインメント</div>
          <div className="mb-2">お問合せ:KONAMIお客様相談室 0570-086-573</div>
          <div className="mb-2 text-gray-500" style={{fontSize:'10px'}}>※特設サイトをご確認ください。https://www.konami.com/yugioh/25th/event/</div>
          <div className="mb-2" style={{fontSize:'10px'}}>＜営利目的の転売禁止＞</div>
          <div className="mb-2">イープラス 050-3185-6483</div>
          <div className="mb-2 font-medium" style={{ color: '#0066CC' }}>チケット裏面情報 ›</div>
          <div className="font-medium" style={{ color: '#0066CC' }}>チケット番号: 1140008501907</div>
        </div>
      </div>

      <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} className="fixed bottom-6 right-6 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg" style={{ backgroundColor: '#00A7A0' }}>
        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7"/>
        </svg>
      </button>
    </div>
  );

  // ======== 選択画面 ========
  const SelectionView = () => (
    <div className="min-h-screen" style={{ backgroundColor: '#F5F5F5' }}>
      <div className="bg-white px-4 py-3 flex items-center justify-between">
        <span style={{ color: '#E91E8C' }} className="font-medium text-sm">1/1枚 選択中</span>
        <button onClick={() => setCurrentView('detail')} className="text-gray-400 text-2xl">×</button>
      </div>

      <div style={{ backgroundColor: '#00A7A0' }} className="text-white text-center py-2 text-xs font-medium">
        2024/02/03 (金) 16:48:42.27
      </div>

      <div className="bg-white mx-4 mt-4 p-4 rounded-lg">
        <div className="flex items-baseline justify-between mb-3">
          <div className="flex items-baseline">
            <span className="text-5xl font-bold mr-2">2/3</span>
            <span className="text-sm font-medium">(土)</span>
          </div>
          <div className="text-right text-xs">
            <div className="mb-1">08:00 開場</div>
            <div>09:00 開演</div>
          </div>
        </div>

        {/* 桜ドラッグ */}
        <div className="flex justify-center items-center mb-4 relative" style={{ gap: '120px' }}>
          <div
            ref={leftStarRef}
            className="w-16 h-16 bg-green-400 rounded-full flex items-center justify-center cursor-move select-none relative z-10"
            style={{
              transform: starDrag.isDragging
                ? `translate(${dragOffset}px, 0px)`
                : 'translate(0, 0)',
              transition: starDrag.isDragging ? 'none' : 'transform 0.3s ease',
              touchAction: 'none'
            }}
            onTouchStart={handleStarTouchStart}
            onTouchMove={handleStarTouchMove}
            onTouchEnd={handleStarTouchEnd}
            onMouseDown={handleStarMouseDown}
          >
            <span className="text-4xl pointer-events-none">⭐</span>
          </div>
          <div className="w-16 h-16 bg-green-400 rounded-full flex items-center justify-center">
            <span className="text-4xl">⭐</span>
          </div>
        </div>

        <div className="text-sm font-bold mb-1">東京ドーム</div>
        <div className="text-xs text-gray-600">遊戯王デュエルモンスターズ 決闘者伝説（The Legend of Duelist）QUARTER CENTURY</div>
      </div>

      <div className="mx-4 mt-3">
        <div style={{ backgroundColor: '#0066CC' }} className="px-4 py-3 rounded-t-lg flex items-center justify-between">
          <span className="text-white font-bold">本多 遥星 様</span>
        </div>
        <div style={{ backgroundColor: '#0066CC' }} className="px-4 py-4 rounded-b-lg flex items-center">
          <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mr-4">
            <svg className="w-10 h-10" viewBox="0 0 24 24">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#0066CC"/>
            </svg>
          </div>
          <div className="text-white flex-1">
            <div className="text-sm font-bold mb-1">通常・一般席アリーナ14時</div>
            <div className="text-xs mb-1">41ゲート 10通路 2階3塁側</div>
            <div className="text-base font-bold">20列 191番</div>
          </div>
        </div>
      </div>
    </div>
  );

  // ======== GATEアニメーション ========
  const GateAnimationView = () => (
    <div className="min-h-screen bg-gray-100">
      <div className="bg-white px-4 py-3">
        <span style={{ color: '#E91E8C' }} className="font-medium text-sm">1/1枚 選択中</span>
      </div>
      <div style={{ backgroundColor: '#00A7A0' }} className="text-white text-center py-2 text-xs">
        2024/02/03 (金) 16:48:47.20
      </div>

      {animationPhase >= 0 && animationPhase < 2 && (
        <div>
          <div className="bg-yellow-300 text-center py-2 text-xs font-bold">
            <div>スライドすると使用済になります。</div>
            <div>使用済チケットは、入場・再発行不可</div>
          </div>
          <div className="bg-blue-700 text-cyan-300 text-center py-24 text-7xl font-black tracking-widest">
            GATE
          </div>
        </div>
      )}

      {animationPhase === 2 && (
        <div className="flex" style={{ height: '200px' }}>
          <div className="flex-1 bg-blue-700 flex items-center justify-center text-yellow-400 text-6xl font-bold">▶▶</div>
          <div className="flex-1" style={{ backgroundColor: '#E91E8C' }}></div>
        </div>
      )}
    </div>
  );

  // ======== 使用済み画面 ========
  const UsedView = () => (
    <div className="min-h-screen" style={{ backgroundColor: '#F5F5F5' }}>
      <div className="bg-white px-4 py-3 flex items-center justify-between">
        <span style={{ color: '#E91E8C' }} className="font-medium text-sm">0/1枚 選択中</span>
        <button onClick={() => setCurrentView('detail')} className="text-gray-400 text-2xl">×</button>
      </div>
      <div style={{ backgroundColor: '#00A7A0' }} className="text-white text-center py-2 text-xs">
        2024/02/03 (金) 16:48:50.49
      </div>
      <div style={{ backgroundColor: '#E91E8C' }} className="text-white text-center py-12 text-lg font-bold">
        1枚使用しました
      </div>

      <div className="px-4 mt-4">
        <div style={{ backgroundColor: '#0066CC' }} className="px-4 py-3 rounded-t-lg">
          <span className="text-white font-bold">本多 遥星 様</span>
        </div>
        <div className="bg-gray-300 p-4 rounded-b-lg relative">
          <div className="flex items-start">
            <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mr-4">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                <rect x="5" y="3" width="14" height="18" rx="2" fill="#9CA3AF"/>
              </svg>
            </div>
            <div>
              <div className="text-black font-bold text-sm mb-1">通常・一般席アリーナ14時</div>
              <div className="text-black text-xs mb-1">41ゲート 10通路 2階3塁側</div>
              <div className="text-black font-bold">20列 191番</div>
            </div>
            <div className="absolute top-4 right-4 border-4 border-red-500 text-red-500 px-2 py-1 rounded font-bold text-sm" style={{ transform: 'rotate(12deg)', animation: 'stampIn 0.3s ease-out' }}>
              使用済
            </div>
          </div>
          <div className="mt-6 text-black text-xs">使用日時: 2024/02/03(金) 16:48</div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="max-w-md mx-auto bg-white min-h-screen">
      {currentView === 'detail' && <DetailView />}
      {currentView === 'selection' && <SelectionView />}
      {currentView === 'gateAnimation' && <GateAnimationView />}
      {currentView === 'used' && <UsedView />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<SmartTicketApp />);
</script>
</body>
</html>
